- title: Ghasem Hajizadeh "Timeless Figures"
  city: Paris
  dates: October 6 - October 16
  location: Galerie Mark Hachem
  description: "The Mark Hachem Gallery and the Simine Paris platform have come together to offer the TIMELESS FIGURES Exhibition,\
    \ a retrospective of paintings by Iranian artist Ghasem Hajizadeh which, in view of the historical aspect of his considerable\
    \ work paired with the strength of his representations, touches both the Eastern and Western public. This exhibition presents\
    \ a series of portraits in the heart of the artist’s world, marked by a “Mystical Iran”.\nThe name “TIMELESS FIGURES”\
    \ suggests a journey into the timeless world of Ghasem Hajizadeh, where the figures of women and men with multiple identities\
    \ are mixed. At the heart of this series is the question of identity. \nGhasem Hajizadeh poetically and elegantly illustrates\
    \ the Iranian woman’s tug of war between her deep desire for modernity, and the weight of the thousand-year-old traditions\
    \ that she carries in her being and on her body. In his work, the Iranian woman is at once modern and free, joyful and\
    \ deep, extravagant and stoic, poetess and revolutionary, hidden and apparent."
  image: assets/images/exhibitions/ghasem-hajizadeh-timeless-figures.jpg
- title: MATHIAS SCHMIED "Perdus dans le cosmos"
  city: PARIS
  dates: Exposition du 1er au 17 Juillet 2022
  description: "Mark Hachem présente « Perdus dans le cosmos », une exposition personnelle de l’artiste Mathias Schmied. L’exposition\
    \ mettra en avant des œuvres inédites de l’artiste ainsi que ses dernières séries « Boogie-night serie » et « Comics ».\n\
    \ \nMathias Schmied étaye son propos par le vide. Cet art méticuleux de la découpe nous ramène à la fragilité des feuilles\
    \ de papiers et magazines.\nL‘artiste découpe la matière en y enlevant les repères, il y extirpe le sens de la narration\
    \ des bandes dessinées, modifie les repères spatio-temporels, redonne une vie aux cartes postales d’antan et nous entraîne\
    \ dans sa lecture personnelle nous dépossédant du sens d’origine : « construire en enlevant »."
  image: assets/images/exhibitions/mathias-schmied-perdus-dans-le-cosmos.gif
