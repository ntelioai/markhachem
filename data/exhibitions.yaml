- title: '"Ceci n''est pas une photo" Yves Hayat'
  city: PARIS
  dates: PARIS November 13 > 26, 2025
  location: 28 PLACE DES VOSGES
  description: 'While PARIS PHOTO 2025 celebrates the art of capturing reality, the Mark Hachem Gallery in Paris is coming
    to stir up trouble with Yves Hayat’s exhibition, «CECI N’EST PAS UNE PHOTO» (This is not a photo).


    Don’t come here looking for photographs. Here, each work is a pure creation of the mind, an image shaped by the artist’s
    imagination with the help of Artificial Intelligence. No photo was taken, yet the emotion is very much present.


    These works, pure digital simulacra, don’t betray photography; they extend it by inviting us to rethink what gives an
    image its value. Is it its truth, or its ability to create emotion and challenge our certainties?'
  image: assets/images/exhibitions/ceci-nest-pas-une-photo-yves-hayat.jpg
  pdf_url: https://web.archive.org/web/20260211174650/http://www.markhachem.com/administrator/components/com_exhibitions/pdf/2fb811b6721237640fee2ef1d1ffbb82-Yves-Hayat--Ceci-n-est-pas-une-photo.pdf
