- title: Hussein Madi
  city: Paris
  dates: Recent Works (2012 – 2019)/ Vernissage Mardi 15 octobre 2019 , à partir de 18h30 / Oening Tuesday 15st octobrer ,
    from 6.30pm15.10.19
  location: 28 place des Vosges
  description: "MADI\nRecent Works (2012 – 2019)\n16.10.19 - 13.11.11\n\n44 rue des Tournelles 75004 & 28 Place des Vosges\
    \ 75003 Paris\n\nMark Hachem is delighted and honoured to present a collection of rare paintings and sculptures by Hussein\
    \ Madi. An exceptional opportunity to discover the work of the Lebanese artist, 30 years after his 1989 solo show at the\
    \ Arab World Institute in Paris.\n\nHussein Madi, painter, sculptor and engraver, born in 1938 in Chebaa in South Lebanon,\
    \ is one of the Middle East’s most famous artists.\n\n\" here’s the mystery of creation that inspired my art. There is\
    \ a unity at the beginning that reproduces with differences; type, number, colour and dimension. All things that are born\
    \ and die respond to these four categories. The repetition in my paintings is there on purpose and is a way to honour\
    \ the creator. ”\nMadi in L’Orient le jour. 30 July 2019.\n\n___\n\nMark Hachem a le plaisir et l’honneur de présenter\
    \ un ensemble rare de peintures et sculptures de Hussein Madi. Une opportunité exceptionnelle de découvrir l’oeuvre du\
    \ maitre libanais, trente ans après son solo show à l'Institut du Monde Arabe en 1989.\n\nNé en 1938 à Chebaa, au Sud-Liban,\
    \ Hussein Madi, peintre, sculpteur et graveur est l'un des artistes les plus célèbres du Moyen orient.\n\n« ...voilà le\
    \ mystère de la création qui a inspiré mon art. Il existe au départ une unité qui se reproduit dans une différence de\
    \ genre, de nombre, de couleur, et dans une différence de dimension. La répétition n’est pas un hasard dans mes toiles,\
    \ mais une façon d’honorer le créateur. \L\" H. Madi. in L'Orient 2019."
  image: assets/images/exhibitions/hussein-madi.jpg
