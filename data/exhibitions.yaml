- title: In the Memory of the Ones Who Won't Make it by Jacques Vartabedian
  city: BEIRUT
  dates: April 19, 2018 - May 10, 2018
  location: Mark Hachem Gallery - Beirut
  description: 'For the last few months, it has become a part of our daily routine to watch or hear of things related to political
    campaigns, constantly seeing billboards filled with faces we have come to know, some of which are new, and some of which
    have been ruling for a decade or two now.

    To Jacques, this exhibition examines the presence of the politicians’ portraits in our daily lives. It questions the circulation
    of those images and the response of the public to these visual impressions. By highlighting the complex inter relationships
    between the individual and the represented images and other socio- historical/political factors, he is also highlighting
    the contradictory perceptions of freedom.

    Throughout some of the works, Jacques reconstructs the destiny of these political election posters after the elections
    are done and gone. The ones who won’t make it are erased, ripped off the wall and forgotten, until the next campaigns
    are in order of course. But the ones who did make it will be implemented in our daily lives once more.'
  image: assets/images/exhibitions/in-the-memory-of-the-ones-who-wont-make-it-by-jacques-vartabedian.jpg
  pdf_url: https://web.archive.org/web/20260214130507/http://markhachem.com/administrator/components/com_exhibitions/pdf/9d35fc65c497f0d5dacd7d77ee9f80e5-JACQUES-VARTABEDIAN-PRESS-RELEASE.pdf
- title: Anthony MIRIAL - PARADIS PERDU
  city: Paris
  dates: Exposition du 11 au 25 Avril, 2018
  description: 'L’exposition se divise en deux séries articulées autour d’un sujet commun : le voyage. Un voyage en métro
    qui fait écho à un autre voyage, la mort...


    La première série présentée, « Blessures de guerre » (2016) met en scène des personnages oniriques, frappés en plein corps
    par les attentats du 13 novembre 2015. Qu’ils semblent libérés dans l’éther céleste, ou bien figés dans une pierre criblée
    de balles, ils témoignent tous d’une ville blessée, portant en leur corps, par transparence, les séquelles physiques d’une
    guerre idéologique...


    « Le spleen de Paris » (2017-2018), seconde série de l’exposition, et présentée en exclusivité, se distingue par son travail
    sur le réel ; Mirial photographie des inconnus dans le métro parisien, avant de les ramener dans son univers, passant
    d’une vision du corps (« posé ») à des corps (« volés »)…

    Une première pour l’artiste ! De cet abîme d’âmes tristes, vides ou aspirées par la technologie se dégage toute la beauté
    sensible de cette oeuvre. La composition de tout cela est singulière : des tableaux interchangeables, composés de wagons
    de métro assemblés, qui, mis bout à bout forme une seule et même œuvre évolutive de près de 8 mètres !'
  image: assets/images/exhibitions/anthony-mirial-paradis-perdu.jpg
  pdf_url: https://web.archive.org/web/20260214130507/http://markhachem.com/administrator/components/com_exhibitions/pdf/4e7360be580a6ecd178adb94e41529ee-web-DP-MIRIAL-2018.pdf
- title: WRITINGS BY GEORGE MERHEB
  city: Beirut
  dates: March 15 - March 31, 2018
  location: Mark Hachem Gallery - Beirut
  description: "Mark Hachem Gallery - Beirut is delighted to present “Writings”, a solo exhibition by Lebanese artist George\
    \ Merheb, featuring a new body of works.\nHaunted by letters, and their dimension in time and space, their energy beyond\
    \ their shape, George Merheb offers a systematic demolition of traditional writings in his works for the benefit of a\
    \ new global language.\nDaisy Abi Jaber writes: “For George Merheb, writing and drawing have shared destinies. He juggles\
    \ with lines, colors and letters with a dizzying mixture of features and curves. His brush navigates the canvas in a falsely\
    \ chaotic way, eliminating alphabets, codified drawings that refer to ideas or simply an expression or impression that\
    \ becomes a performance.\nMerheb’s rebellion against words and the norm of their significance proposes a new insight into\
    \ the artist’s manifestation, without falling into the rules and codes of their everyday usage. The brush strokes dance\
    \ their way through the canvas to surpass what we are so accustomed to seeing with letters and words.\nAbi Jaber continues\
    \ to write “...This pictorial Babel questions the articulation between the plurality of languages and alphabets; transforming\
    \ themselves permanently, as immobile and sometimes as abstract, but still animated by a supernatural magic of the artist’s\
    \ gestures and actions proving that creativity never fades. A single piece of data can create thousands of perspectives\
    \ and can exceed all the borders of the world.”\n.   studied in Venice,\nItaly from 1992   96.\nMerheb’s work has been\
    \ featured in numerous solo and group exhibitions throughout\nEurope and the Arab world. George has also participated\
    \ in several international fairs in France, Switzerland, Egypt and Lebanon.\n,-\n Born in Lebanon in 1960, Merheb has\
    \ obtained a master’s degree in drawing and\n painting from the Lebanese University of Beirut, Lebanon\nHe then\nto 19\n\
    His most noted accomplishments include limited edition lithography’s at the “National\nMuseum” of Beirut,\n- Lebanon,\
    \ a 450m2 painting of murals for “Chantier Fence” in\nBeirut Central District and 250m2 paintings of murals at “St Antoine\
    \ Church” Baabdat\nLebanon."
  image: assets/images/exhibitions/writings-by-george-merheb.jpg
  pdf_url: https://web.archive.org/web/20260214130507/http://markhachem.com/administrator/components/com_exhibitions/pdf/52dd5c8ddcc25ea2a055faadc050cf0b-GEORGE-MERHEB-PRESS-RELEASE---.pdf
- title: Transformation by Chaouki Chamoun
  city: Beirut
  dates: February 1, 2018 - February 22, 2018
  location: Mark Hachem Gallery - Beirut
  description: 'Mark Hachem Gallery - Beirut is delighted to present “Transformation”, a solo exhibition by artist Chaouki
    Chamoun, featuring a selection of his most recent works.


    Upon a visit to Chamoun’s studio, Akel Awitt had the chance to study the truly magnificent new series after which he wrote:
    “I prefer not to stand long in front of Chamoun’s paintings so that I am not jealous, so that I do not burn and drown.
    I flee from it and into it so that it does not pull me into its ropes; those infernal ropes. It infuriates me that he
    is ahead of me, that he is intriguing and bold. That he takes me out of my own self, so that I become part of the painting,
    of its atmosphere and mixture.”'
