- title: Hamed Abdalla, "Le Caire - Paris"
  city: Paris
  dates: 16 octobre - 30 novembre 2018
  location: 44 rue des Tournelles 75004 & 28 Place des Vosges 75003
  description: 'A  partir du 16 octobre, la galerie Mark Hachem présente une exposition rétrospective de Hamed Abdalla (1917-1985)
    dans ses deux galeries à Paris.

    Depuis quelques années, la redécouverte de ce grand maitre égyptien du XXe s’est considérablement accélérée.  Ses oeuvres
    viennent d’intégrer les collections de la TATE et vont entrer prochainement dans d’autres collections publiques internationales
    prestigieuses.


    L’exposition "Le Caire - Paris" est conçue comme une rétrospective qui permet de découvrir l’extraordinaire évolution
    de l’artiste sur 40 années de création.


    Elle ne comporte que des chefs-d’oeuvre rares et historiques de l’artiste. C’est un des événements majeurs de la semaine
    de l’art.'
