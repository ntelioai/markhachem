- title: PROVOCATIVE MOODS by Robert Farber
  city: Paris
  dates: 'Vernissage: Vendredi 10 Novembre 2017

    || Exposition du 11 au 21 Novembre, 2017'
  location: 28 Place des Vosges 75003 Paris
  description: 'La Galerie Mark Hachem présente « Provocative Moods » une exposition personnelle de Robert Farber sous le
    commissariat de Géraldine Beigbeder.


    L’exposition présente « THE DETERIORATION SERIES  - une collaboration avec le temps » ; Une série des photos classiques
    de Farber prisent entre les années 70 et 90 qui ont été naturellement détériorées par le temps. Aucune retouche ou manipulation
    n’ont été effectuées, uniquement le processus naturel de détérioration.


    Le style de ROBERT Farber a influencé des générations de photographes à travers ses expositions internationales dans des
    galeries et des musées. Ses dix livres d''art classique se sont vendus à plus d''un demi-million d''exemplaires. Il a
    travaillé avec Jackie Kennedy Onassis, Larry Flynt  entre autres.

    La reconnaissance mondiale de Robert Farber a été établie à travers ses livres, ses expositions d''art, ses conférences,
    ses interviews télévisées et ses campagnes publicitaires primées. Tous dans les genres de la mode, de la beauté et du
    style de vie.

    Le travail de Farber sur les nus artistiques ainsi que dans le domaine commercial est connu et respecté. Il a donné des
    conférences à Ogilvy & Mather sur le «Nu dans la publicité». L''ASMP a demandé d''utiliser les nus de Farber comme exemple
    de l''application artistique en faveur de la National Endowment of Arts, après son soutien à la controversée exposition
    Mapplethorpe / Serrano. Son livre, "Farber Nudes", a également été inclus dans la collection Jacqueline Kennedy Onassis.

    Robert Farber enseigne au Smithsonian Institute, à la George Eastman House, ainsi qu''à des universités et des groupes
    professionnels à travers les États-Unis, le Japon, l''Australie et l''Europe.

    Un documentaire sur la vie et la carrière de Farber est en cours de développement pour PBS.'
  image: assets/images/exhibitions/provocative-moods-by-robert-farber.png
  pdf_url: https://web.archive.org/web/20260214130507/http://markhachem.com/administrator/components/com_exhibitions/pdf/d48773cf268bff82421eba85b88eac55-Mark-HachemPDF.pdf
