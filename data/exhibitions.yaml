- title: RETRO-PER-SPECTIVE by MARWAN CHAMAA
  city: Beirut
  dates: November 20th - December 8th, 2018
  description: "Mark Hachem Gallery - Beirut is delighted to present “RETRO-PER-SPECTIVE”, a solo exhibition by artist Marwan\
    \ Chamaa, featuring his various interpretations of pop culture through select pieces past and present.\n\nThroughout his\
    \ career, Marwan Chamaa’s art has fundamentally been his view of the world with an ironic and sometimes sarcastic undertone.\
    \ Marwan, who has been painting for over 3 decades, embodies the spirit of a global citizen without overlooking his Middle\
    \ Eastern roots. This is translated in his art and lifestyle that bridges the gap between East and West. The physical\
    \ world is his muse.\n\nThe French magazine, St. Tropez House, dubbed Marwan in their August 5, 2014 issue as the “King\
    \ of Middle Eastern neo-pop art”, when referring to his series “Caramels, Superheroes, fried eggs and chocolates” which\
    \ was then displayed in a gallery in Saint-Tropez. \n\nAccomplished New York photographer Carlos René Pérez considered\
    \ his collaboration with Chamaa on the series “Unplugged” as some sort of a revelation. He says: “Uncertain of its ultimate\
    \ direction I was somewhat circumspect, and curious as well, as to where this project might lead. Exceeding my expectations\
    \ Marwan’s extraordinary paintings and his hyper-visual narrative led me back to my doorstep, my hometown, my New York\
    \ City. Marwan Chamaa’s, Unplugged, has embraced NYC as a second home with all the warts and the foul scents it comes\
    \ with. Ultimately my collaboration with Marwan teaches me that the mystery and beauty of New York City is only limited\
    \ to the imagination of the artist who attempts to define it.”\n\nOn his upcoming show “Retro-per-spective” Marwan explains\
    \ his view on the concept saying “I’m supposed to write something witty about this exposition, about me painting for over\
    \ 30 years, why my surroundings inspire me, about my love for pop-culture, my fascination with consumerism, my addiction\
    \ to life, my love for kitsch, and about so many things that make me sound artistic... well, I’m not going to do that.\
    \ You have to make up your own mind about my art, all I can say is: today is a perfect day “\n\nThe focus of RETRO-PER-SPECTIVE\
    \ is Marwan’s recent work but it will also include some of his RETRO work dating back 30 years. The exposition will show\
    \ his PER-SPECTIVE of pop-culture.\n\nMarwan Chamaa was born in Beirut in 1964 and has spent most of his adult life in\
    \ Germany, Lebanon, and the USA. He studied art at the American University of Beirut, Beirut University College, and at\
    \ the Corcoran School of Art in Washington DC.\nChamaa participated in several group shows, art fairs, and auctions. His\
    \ work has been displayed in Lebanon, France, Switzerland, United Arab Emirates, and Kuwait and is being collected all\
    \ over the globe."
  image: assets/images/exhibitions/retro-per-spective-by-marwan-chamaa.jpg
  pdf_url: https://web.archive.org/web/20260214135035/https://markhachem.com/administrator/components/com_exhibitions/pdf/9d3abaf29db2b573aa0f7538ae6dbfae-Marwan-Chamaa-Press-Release-November-2018.pdf
- title: SENSIBLE EXPRESSION  BY ALFRED BASBOUS
  city: Beirut
  dates: October 25 - November 20, 2018
  location: Mark Hachem Gallery - Beirut
  description: 'Mark Hachem Gallery is delighted to present an exhibition of relief and sculpture by artist Alfred Basbous
    (1924 – 2006). A major pioneer of Modernist sculpture in the Middle East, Basbous drew on the influence of Jean Arp, Constantin
    Brâncuși and Henry Moore to create stone and bronze sculptures of often monumental proportions. The exhibition brings
    together a series of sculptures from the 1960''s to the 2000''s, which demonstrate Basbous’ exploration of the relationship
    between form and material. A selection of Basbous’ preparatory drawings which reveal his approach to relief and sculpture
    are also exhibited.

    Sculptor Alfred Basbous (1924 - 2006) was born in Rachana, Lebanon. His works express a lifelong exploration of the human
    form and its abstract properties. Throughout his life, Basbous won many awards including the Prix de l''Orient in Beirut
    in 1963 and the prize for the Alexandria Biennale in 1974. Upon his death, the President of the Lebanese Republic awarded
    him the Medal of the Lebanese Order of Merit in Gold. A national stamp of Alfred Basbous and his two brothers Michel and
    Youssef, also sculptors, was released in 2011 by the Lebanese State as a tribute to their contribution to Lebanese culture.
    The works of Alfred Basbous are part of the permanent collection of the Alfred Basbous Foundation in Rachana, Lebanon
    and are featured in many private and public collections, including the Musée Rodin, Paris, the Ashmolean Museum, Oxford,
    the Hakone Open-Air Museum in Japan and the Modern and Contemporary Art Museum (MACAM) in Lebanon, among others. His monumental
    works are present in the public areas of Beirut and many other Lebanese cities.'
