- title: Prisons Contemporaines
  city: Paris
  dates: 20 juin - 9 juillet 2023
  location: 28 place des Vosges
  description: 'La galerie Mark Hachem présente l''exposition personnelle " Prisons Contemporaines " de l''artiste Yves Hayat,
    il nous présente le concept de l’enfermement, mais son propos va au delà de l’incarcération physique, car aujourd’hui,
    plus que jamais, le véritable enfermement se trouve au-delà des murs de prison: la course effrénée à la célébrité,
    la soumission de notre société moderne aux marques et aux injonctions de la beauté. Mais aussi dans le quotidien de
    chaque individu, comme le contrôle de nos vies par les réseaux sociaux, la video-protection, la reconnaissance faciale,
    les moyens de paiements. Pour aller encore plus loin, la religion et les traditions,  l’auto-enfermement, la solitude,
    le confinement et mêmes les addictions.'
  pdf_url: https://web.archive.org/web/20260123014311/http://markhachem.com/administrator/components/com_exhibitions/pdf/0d942a5f0f804e76b7c3620678e036ce-COMMUNIQUE-DE-PRESSE---Yves-Hayat--Prisons-contemporaines.pdf
  image: assets/images/exhibitions/prisons-contemporaines.jpg
- title: Taking the long way home
  city: Paris
  dates: 6 juin - 27 juin 2023
  location: 28 place des Vosges
  description: "La Galerie Mark Hachem présente \"Taking the long way home\", une exposition qui met en scène l'univers enchanteur\
    \ de James Chedburn et l'œil artistique de Jean-François Deroubaix .\nJames Chedburn, sculpteur britannique établi en\
    \ France depuis 1990, offre une expérience empreinte de magie et d'évasion à la Galerie Mark Hachem - Paris. Son travail\
    \ figuratif, véritable ode au mouvement, transcende les limites de l'art traditionnel pour offrir une expérience sensorielle\
    \ unique. Dans cette exposition, les sculptures captivantes de Chedburn sont magnifiées par les photographies envoûtantes\
    \ de Jean-François Deroubaix. \nLes pièces exposées révèlent les aspirations profondes de James Chedburn, évoquant le\
    \ désir d'exploration, de Casablanca à Liverpool, ces destinations légendaires qui nourrissent nos imaginaires et font\
    \ naître une soif intarissable d'aventure. L'artiste nous convie à embarquer à bord de vaisseaux insolites, confectionnés\
    \ à partir de bric-à-brac et d'objets recyclés, offrant ainsi une seconde vie à ces trésors du passé. Ces navires singuliers\
    \ nous transportent vers des contrées poétiques et imaginaires, réveillant en nous les rêves d'enfant, ces moments où\
    \ nous aspirions à échapper à un quotidien, voguant librement dans les airs et sur les flots, affranchis de toute contrainte\
    \ temporelle."
  image: assets/images/exhibitions/taking-the-long-way-home.jpg
