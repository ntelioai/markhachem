- title: FATIMA EL-HAJJ "BALADES LEVANTINES"
  city: PARIS
  dates: ''
  description: 'Mark Hachem présente « Balades levantines », une exposition personnelle de l’artiste libanaise Fatima El-Hajj. 

    Élève du peintre libanais et parisien Shafic Abboud, qui fut son professeur admiré et aimé, Fatima El-Hajj ne cache pas
    son admiration pour Matisse, Bonnard et Vuillard. Elle appartient à cette famille de peintres impressionnistes qui l’a
    aidée à trouver sa propre voie.

    Les paysages de Fatima El-Hajj sont inspirés des parcs et jardins des villes qu’elle a observés et affectionnés au cours
    de ses voyages au Liban, au Yémen, au Maroc et en France. Sa palette et sa mémoire ont gardé vives les formes, les couleurs
    et la lumière de ces lieux et de leurs habitants.'
