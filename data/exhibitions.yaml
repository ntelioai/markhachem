- title: '" Sunday in The Park with Tom ", Marwan Chamaa''s solo show'
  city: Beirut
  dates: October 10, 6pm - October 26
  location: Ground Floor Capital Garden Bldg, Mina el Hosn, Beirut Central District
  description: 'Mark Hachem Gallery is proud to present a solo exhibition by the Lebanese artist Marwan Chamaa, from October
    12th till the 26th. A pioneer of Lebanese Neo Pop-Art, we can see influences of the likes of Warhol and Lichtenstein in
    his work, with their bold colours, layered content, and comic-style. His carefully chaotic works reflect our culture of
    consumerism, while simultaneously creating a sense of rawness thanks to his use of styles typically attributed to graffiti.

    Born in Beirut, Marwan Chamaa’s artistic journey led him to study at institutions like the American University of Beirut,
    the Lebanese American University, and the Corcoran School of the Arts & Design at George Washington University, and has
    led him to spend his adult life between Lebanon, the USA, and Germany. Throughout his career, Chamaa’s art has been a
    reflection of his unique perspective on the world, and his familiarity with multiple cultures has enhanced this perspective,
    broadening it to impact his art. He draws inspiration from his immediate surroundings and personal experiences, using
    the physical world itself as his muse.

    In his “Sunday in the Park with Tom” series, Marwan celebrates the beauty of life through an illustrated letter to American
    Pop Artist, Tom Wesselmann. This letter is written by an individual who is embarking on a new life in a foreign city,
    leaving behind their homeland. It’s a heartfelt letter full of color and excitement for a new beginning.'
  image: assets/images/exhibitions/sunday-in-the-park-with-tom-marwan-chamaas-solo-show.jpeg
- title: '" Them ", a solo exhibition by Rima Salamoun'
  city: ''
  dates: 21st september
  location: Ground Floor Capital Garden Bldg, Mina el Hosn, Beirut Central District
  description: "Mark Hachem Gallery is delighted to present the solo exhibition of visionary Syrian artist, Rima Salamoun\n\
    The artist describes herself as a dedicated observer of human evolution and the ever-shifting tides of change. Fueled\
    \ by her profound fascination with the human experience and her passion for drawing and painting, she has cemented herself\
    \ in the art world as an unparalleled storyteller. She completed her education in Fine Arts at the Damascus University\
    \ in 1987, and has since become a great artistic force, with her work being shown at length both locally and abroad. A\
    \ respected member of the Syrian Syndicate of Fine Arts, Salamoun’s presence graced numerous collective exhibitions across\
    \ the Arab world and Europe. \n\nIn her work, Salamoun explores women’s lives; she places great importance on representing\
    \ the human condition, and all the paradoxes within it. She views herself, and indeed all artists, as witnesses of life.\
    \ Her work is like a diary; she imbues each brushstroke with intention, depicting the world and people she perceives,\
    \ narrating her experiences through art."
  image: assets/images/exhibitions/them-a-solo-exhibition-by-rima-salamoun.jpeg
