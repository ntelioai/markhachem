- title: '" Les inattendus " Solo Show de l''artiste Mauro Corda'
  city: Paris
  dates: 18 Décembre 2023 - 2 Janvier 2024
  location: 28, Place des Vosges, 75003
  description: 'Dans cette toute nouvelle exposition présentée à la Galerie Mark Hachem, Mauro Corda s''engage à rendre l''art
    accessible à chacun, élargissant ainsi son impact sur un public plus vaste. En tant qu''humaniste au regard perspicace,
    il perpétue une tradition classique qu''il revendique avec vigueur, tout en l''actualisant de manière magistrale. Il entrelace
    habilement une esthétique établie avec sa vision du monde, lucide, subtile, parfois troublante.

    Naviguant entre les courants du symbolisme, du naturalisme et du surréalisme, l''œuvre de Mauro Corda pointe avec audace
    les grandes interrogations contemporaines telles que l''identité, l''environnement, la génétique, les fléaux épidémiques
    et les progrès scientifiques. Il partage également avec une profonde émotion son ressenti intime face à un thème universel,
    celui de la vie et de la mort, un sujet auquel tous les grands artistes ont prêté leur écho au fil du temps.'
  image: assets/images/exhibitions/les-inattendus-solo-show-de-lartiste-mauro-corda.png
