- title: Stephen Peirce, Nascent States
  city: Paris
  dates: 10.10.17- 16.12.17
  location: Mark Hachem - 44 rue des Tournelles 75003 Paris
  description: 'La galerie Mark Hachem présente les peintures à l’huile de l’artiste anglais Stephen Peirce.

    Quand l’inanimé s''agrège en un tout vivant, organique, qui nous semble familier mais que nous ne pouvons pourtant identifier…
    Au delà d’une technique parfaite, d’une maitrise exceptionnelle de la couleur et de la lumière, les peintures de Peirce
    montrent un univers absolument unique. Dans la tradition des maitres du passé, avec une facture hyperréalisme - quasi
    3D - Stephen Peirce peint un futur dont on ne veut pas, nous prévient de sa probable fatalité tout en imaginant son étrange
    beauté. Virtuose et déroutant. **** The gallery Mark Hachem presents the oil paintings of the English artist Stephen Peirce.

    Contemplating Peirce''s paintings is like a vision of the inanimate growing into a living, organic whole, which seems
    familiar to us but which we can not yet identify... Beyond a perfect technique, an exceptional mastery of color and light,
    the paintings of Peirce show an absolutely unique universe. In the tradition of the masters of the past, with a hyperrealistic
    - almost 3D - touch, Stephen Peirce paints a future without

    humanity, warns us of its probable fatality and imagines its strange beauty. Virtuoso and enigmatic.'
  pdf_url: https://web.archive.org/web/20260214130507/http://markhachem.com/administrator/components/com_exhibitions/pdf/860c648c58e2c303fb20f6888cc09ee1-stephen-peirce-nascent-states.pdf
