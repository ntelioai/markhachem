- title: DECOMPOSITIONS DU MOUVEMENT BY SON SEOCK
  city: Paris
  dates: 'Opening Reception: December 14th, 2017 | | December 15th, 2017 - January 5th, 2018'
  location: 28 Place des Vosges, 75003 Paris
  description: "La Galerie Mark Hachem présente « Décompositions du mouvement » une exposition personnelle de l’artiste coréen\
    \ Son Seock.\nSon Seock est né en Corée du Sud en 1955, et il vit et travaille en France depuis 1995.\n  Ses œuvres appartiennent\
    \ au monde des sensations visuelles : à chaque changement de position, le spectateur peut observer une transformation\
    \ au niveau de la couleur, de la forme, et de la profondeur. Les images disparaissent et apparaissent en fonction de notre\
    \ mouvement, et nous avons même l’impression qu’elles s’échappent du plan du tableau pour nous rejoindre dans le réel.\
    \ Le spectateur devient engagé dans l’œuvre, fasciné par les effets surréels crées par le contraste entre les images aux\
    \ premier et arrière plans, et aussi par l’aspect tactile, achevé par l’utilisation du pointillisme. L’œuvre de Son Seock\
    \ transcende la peinture traditionnelle, et développe de nouvelles méthodes, tout en se tenant à l’écart d’un monde qui\
    \ devient graduellement plus centré sur les médias digitaux et la photographie.\n Les lignes verticales créent l’illusion\
    \ : elles ne sont pas réparties au hasard, mais sont le résultat d’une pensée mathématique et logique de la part de l’artiste.\
    \ L’importance des sujets, par exemple, les éléphants et la céramique est alors réduite ; Son Seock ne les représente\
    \ pas au premier plan, mais les introduit presque comme des objets-fantômes. Cependant, une telle minimisation du narratif\
    \ fixe n’illustre pas un manque de signification, puisqu’elle permet le spectateur de se concentrer plutôt sur l’esthétique\
    \ et le figuratif.\n Les œuvres tactiles de Son Seock exposent la qualité immatérielle des objets. En établissant un lien\
    \ entre les images et le fond tactile, l’artiste suggère un renversement de la logique. Lorsque le vase disparaît, le\
    \ spectateur se rend compte du chaos de la perception et de sa relativité.  Ainsi, Son Seock permet a son public de découvrir\
    \ l’écart entre ce qui existe, et ce qui n’existe pas, entre le visible et l’invisible."
  image: assets/images/exhibitions/decompositions-du-mouvement-by-son-seock.jpg
