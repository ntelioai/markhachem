- title: Artful Crimes
  city: Beyrouth
  dates: 22 june - 6 july
  location: Beirut Central District, Lebanon
  description: die Famous is a collaboration between American painter Morrison Pierce (b.1972) and Lebanese/Finnish painter
    Yasmina Nysten (b.1988).Yasmina's work has been faithful to this asymmetrical experiment conducted on the human form since
    2009. Both similarly influenced by various movements, namely pop art and the running currents of progressive painters
    on the east coast from the 80s and 90s, die Famous brings a ting of darkness and a bite to their vision of the contemporary
    world. Working in mixed media, mainly on canvas, die Famous remains loyal to the street art esthetics and paint murals
    frequently in various locations in the US. die Famous stands for being non-apologetic about artistic explorations in Love
    and Death. It is about staying in direct correlation with the energy which brings each work to life.
