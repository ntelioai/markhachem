  city: PARIS
  dates: 12 MAI 2022 - 28 MAI 2022
  description: "Mark Hachem présente « Space Time Glass », une exposition personnelle de l’artiste florentin Michelangelo\
    \ Bastiani.\n\nLes hologrammes de Michelangelo Bastiani combinent l'espace tridimensionnel et l'espace-temps.\n\nSes œuvres\
    \ sont placées dans l'espace physique et s'inspirent de la théorie oléographique de Bohm, selon laquelle \"notre univers\
    \ est un hologramme gigantesque et splendidement détaillé\". Le temps distingue une vidéo d'une image statique : l'échelle\
    \ de temps est la différence essentielle entre les deux.\nL'artiste florentin présente également de nouvelles œuvres réalisées\
    \ en verre et en résine colorée, soulignant le caractère irremplaçable de ce matériau, sa transparence et sa flexibilité.\
    \ Le matériau le plus approprié pour démontrer les réactions chimiques, les connexions entre les fluides, comme s'il s'agissait\
    \ d'un flux sanguin.\n \nBastiani présentera pour la première fois ses installations colorées, des hologrammes de différentes\
    \ tailles et une grande projection vidéo.\n\nDans ses hologrammes, la nature se mêle à l'artifice : la force des éléments\
    \ est représentée comme une sorte de paradoxe où la nature est piégée par la main de l'homme, mais entre-temps exaltée\
    \ par son utilisation habile de la technologie. Bastiani donne aux phénomènes naturels ou aux gracieuses figures féminines\
    \ une nouvelle demeure, sous la forme d'une bouteille en verre : un microcosme communiquant perpétuellement avec le public\
    \ dans la vision d'une scène réaliste et cohérente.\nEntre réel et virtuel, nature et artifice, Bastiani poursuit une\
    \ recherche artistique où les seules constantes semblent être la transformation, et l'évolution de ses œuvres dans le\
    \ temps.\n\nLa deuxième exposition personnelle de Michelangelo à Paris, qui s'interroge sur le commencement de toute chose,\
    \ transforme la galerie Mark Hachem en un lieu d'animation culturelle collective, une vision partagée qui définira la\
    \ relation interpersonnelle entre la société et la production artistique contemporaine."
  image: assets/images/exhibitions/michelangelo-bastiani-space-time-glass.jpg
- title: George Merheb - "Trees"
  city: BEIRUT
  dates: 10th - 24th May 2022
  description: "George Merheb is one of those artists who live and breathe, the light, the shining sun, the blue sky, the\
    \ warmth, faith, destiny, and the infinite stars. Across the old sea, in Spain and Italy, in Tunisia and Egypt , in Greece\
    \ and Lebanon ,he preaches for the same overwhelming spirit , a spirit of love, fatality and pride. he paints the stone\
    \ arcade ,the wrought iron and the red roofs , obsessed by the beauty of life and the intensity of emotions, he inscribes\
    \ himself among those who believed in this « mare nostro », cherishing the splendor of living , « la joie de vivre »,\
    \ the endless summer nights and the heavenly bliss.\n\nGeorge Merheb, always, is commemorating those festivities which\
    \ made the mediterranean the center of the world : Baalbeck, Carthage, Athens, Pompei, Rome, Byblos. It s about the joy\
    \ and the tears, the beauty and the mask, venus and deception, the good times and the bad times, glamour and flamboyance.\n\
    This refined artist gets inspired from the small things of life that constitute his micro\x02environment : his village\
    \ of Kfarchima, his vaulted house, the terracotta tiles on the ground, the tarnished stucco in his sun-bathed studio,\
    \ the scent of jasmin and thym, the ever present amphoras and the archeological remnants of the glorious days. In addition,\
    \ great passions, the kisses and the lips, fire his heart and brush.\n\nIt shortcutted the inbricate relationships that\
    \ governed the transmediterranean throughout history : Phoenicia and the Etruscans, Caracalla and Julia Domna, Berytus\
    \ and the law school of the roman empire, the crusaders and the holy lands, Venice and the silk road, Fakhreddine and\
    \ Tuscany, David Corm, Habib Srour, Mustafa Farroukh and the pilgrinage to florence and renaissance art to Madi and others\
    \ today around the academy of Rome, George Merheb in his art, represents the typical example of the enlightened Mediterranean,\
    \ a worshiper of pantheism."
  image: assets/images/exhibitions/george-merheb-trees.jpeg
