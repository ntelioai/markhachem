- title: SAILING THE SEVAN SEAS
  city: PARIS
  dates: du 10 avril au 1er Mai 2025
  description: 'La Galerie Mark Hachem a le plaisir d''accueillir une nouvelle escale dans l’univers de James Chedburn, intitulée
    "Sailing the Seven Seas", une traversée artistique où l’océan, le voyage et l’imaginaire se croisent dans une chorégraphie
    cinétique.


    Dans cette exposition inédite, Chedburn nous entraîne dans une odyssée onirique peuplée de navires fantastiques, de créatures
    légendaires et de machines improbables. Chaque sculpture, minutieusement façonnée à partir d’éléments de récupération,
    se transforme en véhicule de rêve, convoquant la nostalgie des grandes expéditions et l’ivresse des départs vers l’inconnu.
    Fidèle à son vocabulaire sculptural, l’artiste propose un bestiaire marin et céleste, où chaque pièce semble flotter entre
    deux mondes, entre les flots et les constellations.'
  image: assets/images/exhibitions/sailing-the-sevan-seas.jpg
