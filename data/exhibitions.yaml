- title: Norman Reedus « Live the life you love »
  city: Paris
  dates: Du 12 au 17 novembre 2022
  location: Paris
  description: 'La galerie Mark Hachem et Geraldine Beigbeder ont le plaisir d''annoncer la représentation de Norman Reedus
    et de présenter l''exposition personnelle de l''artiste à Paris intitulée "Live the life you love".


    Norman Reedus  n''est jamais sans son appareil photo. À l''image de sa vie sur le plateau et dans le monde réel, les images
    de Reedus oscillent entre le réel et le surréel. Certains portraits restent vifs et clairs, tandis que d''autres sont
    lavés dans l''intrigue : granuleux, brumeux et obscurcis. Ce qui unit tous ces visages, ce sont les yeux qui les voient
    : ceux de Norman. De ces yeux émane une intimité perçante, à la fois précieuse et rare.


    À l''occasion de la semaine de la photo à Paris, l''acteur et photographe exposera ses nouvelles œuvres à la Galerie Mark
    Hachem illustrant ses voyages et ses rencontres photographiées au fil de ses nombreuses aventures.'
  image: assets/images/exhibitions/norman-reedus-live-the-life-you-love.jpeg
