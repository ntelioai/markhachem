- title: RÉSONANCES CINÉTIQUES
  city: PARIS
  dates: february 12-25
  location: 44 rue des tournelles
  description: "The exhibition brings together Jesús Rafael Soto, Carlos Cruz-Diez, Dario Perez Flores, Rafael Barrios, Victor\
    \ Vasarely, Julio Le Parc, Philippe Hiquily, Luis Tomasello, René Ugarte, Gregorio Vardanega, and Antonio Asis. These\
    \ iconic figures have left a lasting mark on the history of kinetic art, a revolutionary movement.\n\nTheir shared research\
    \ was supported by Denise René and Sofía Ímber, among the pioneers and promoters of kinetic art, alongside other influential\
    \ figures. Denise René, the legendary gallery owner, organized the 1955 exhibition \"Le Mouvement,\" a pivotal event marking\
    \ the birth of kinetic art in France and Europe. This exhibition brought together visionary artists such as Victor Vasarely,\
    \ Jesús Rafael Soto, and Carlos Cruz-Diez, highlighting their exploration of movement and perception.\n \nOn the other\
    \ side of the Atlantic, Sofía Ímber, founder of the Museum of Contemporary Art of Caracas (MACC) in 1973, played a crucial\
    \ role in promoting kinetic art in Latin America. Thanks to her, artists like Jesús Rafael Soto and Carlos Cruz-Diez gained\
    \ worldwide recognition, with their works entering prestigious collections such as those of MoMA in New York, Tate Modern\
    \ in London, and Centre Pompidou in Paris."
  image: assets/images/exhibitions/résonances-cinétiques.jpg
  pdf_url: https://web.archive.org/web/20260211174650/http://www.markhachem.com/administrator/components/com_exhibitions/pdf/898558f18dbdf952c19d72dec9b8e76d-Vernissage.pdf
