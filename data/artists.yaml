- name: Hamed ABDALLA
  category: Modern
  subtitle: 1917-1985
  bio: 'Hamed Abdalla (1917-1985), was a pioneer of Egyptian and Arab modernism. A self taught artist from a modest peasant
    family pf upper Egypt, he rose to prominence early in his career. Abdalla started painting at the age of 10 inspired by
    his fellah’s environnement, later his work centred on his development of what he called "the Creative word", written words
    expressed in paint, blending abstraction and human forms. He had his first solo exhibition in 1941, before going on to
    show widely throughout Egypt in the 1940s including a solo show at the Museum of Modern Art Cairo (1949), when art critics,
    such as Badr Eddine Abu Ghazi, considered his work as a new school for egyptian Art. At the same time Abdalla opened his
    Atelier in Cairo to teach new generation of artists such as Tahia Halim, Gazbia Serri, Enjy Efflatoun, Georges El Bahgory...
    His first trip to Paris saw him exhibit at the Gallery Bernheim-Jeune (1950), followed by a group show at Palais du Louvre,
    and a show at Egyptian Institute, London (1951). From the mid 1950s he was exhibiting throughout Europe, the US and Asia,
    including a group show at the Metropolitan Museum, New York (1956). He left Egypt for Danemark (1956) and France (1966),
    but was commited to the pan Arab movement, and exhibited widely in the Middle East and North Africa. His works are on
    show in various international collections and museums such as Egyptian Modern Art Museum Cairo, Metropolitan Museum of
    Art New York, Tate Modern London, Barjeel Art collection, Museum of Modern Art Tunis, Mathaf Doha, Institut du Monde Arabe
    Paris, Dalloul Art Foundation Beirut… Hamed Abdalla (1917-1985) est un pionnier du modernisme égyptien et arabe. Artiste
    autodidacte issu d''une modeste famille de paysans de Haute-Égypte, il s''est fait connaître très tôt dans sa carrière.
    Abdalla a commencé à peindre à l''âge de 10 ans, inspiré par l''environnement de son fellah. Plus tard, son travail s''est
    concentré sur le développement de ce qu''il appelait "le mot créatif", des mots écrits exprimés en peinture, mêlant abstraction
    et formes humaines. Il réalise sa première exposition personnelle en 1941, avant d''exposer dans toute l''Égypte dans
    les années 1940, notamment au Musée d''art moderne du Caire (1949), où des critiques d''art, tels que Badr Eddine Abu
    Ghazi, considèrent son travail comme une nouvelle école d''art égyptienne. À la même époque, Abdalla ouvre son atelier
    au Caire pour enseigner à la nouvelle génération d''artistes tels que Tahia Halim, Gazbia Serri, Enjy Efflatoun, Georges
    El Bahgory... Lors de son premier voyage à Paris, il expose à la galerie Bernheim-Jeune (1950), puis il participe à une
    exposition de groupe au Palais du Louvre et à une exposition à l''Egyptian Institute, à Londres (1951). À partir du milieu
    des années 1950, il expose dans toute l''Europe, aux États-Unis et en Asie, et présente notamment une exposition de groupe
    au Metropolitan Museum de New York (1956). Il quitte l''Égypte pour le Danemark (1956) et la France (1966), mais reste
    engagé dans le mouvement panarabe et expose largement au Moyen-Orient et en Afrique du Nord. Ses œuvres sont exposées
    dans plusieurs collections et musées internationaux tels que le Musée égyptien d''art moderne du Caire, le Metropolitan
    Museum of Art de New York, la Tate Modern de Londres, la collection Barjeel Art, le Musée d''art moderne de Tunis, le
    Mathaf de Doha, l''Institut du monde arabe de Paris, la Dalloul Art Foundation de Beyrouth... <span style="font-size:
    11pt; font-family: Arial, sans-serif; color: #000000; background-color: transparent; font-weight: 400; font-style: no'
  image: assets/images/artists/hamed-abdalla.jpg
- name: Helen Khal
  category: Modern
  image: assets/images/artists/helen-khal.jpg
  subtitle: Born in 1923, Pennsylvania, USA.
  bio: Helen Khal grew up in a Lebanese family in Pennsylvania. In 1946, she went to live in Lebanon for two years, studying
    painting at the Lebanese Academy of Fine Arts in Beirut, and meeting the artists Shafic Abboud (1926 – 2004) and Yvette
    Achkar (born in 1928) and the sculptor Michel Basbous (born in 1921). After her marriage to the poet Yusuf al-Khal, she
    continued her studies at the Art Students League in New York, but it was not until 1960 that she had her first exhibition,
    at the Galerie Alecco Saab in Beirut. Her style became increasingly expressionist and emotional following the deaths of
    her mother and brother. In 1963, she co-founded Gallery One, the first gallery of its kind not only in Lebanon but in
    the whole of the eastern Arab region. She became a teacher at the American University of Beirut and an art critic for
    the Daily Star and Monday Morning. In 1987, she authored the influential book, The Woman Artist in Lebanon. She returned
    to Lebanon in the 1990s where she continued to write art criticism. Her other one-woman shows took place at Galerie Trois
    Feuilles d’Or, Beirut (1965); Galerie Manoug, Beirut (1968); at the First National Bank, Allentown, Pennsylvania (1969);
    in Kaslik, Lebanon (1970); at the Contact Art Gallery, Beirut (1972, 1974 and 1975) and at the Bolivar Gallery in Kingston,
    Jamaica in 1975. Her work also appeared in the Biennales of Alexandria and Sao Paulo Helen Khal a grandi dans une famille
    libanaise en Pennsylvanie. En 1946, elle part vivre au Liban pendant deux ans, et pendant ce temps étudie la peinture
    à l'Académie libanaise des beaux-arts de Beyrouth et rencontre les artistes Shafic Abboud (1926 - 2004) et Yvette Achkar
    (née en 1928) et le sculpteur Michel Basbous (né en 1921). Après son mariage avec le poète Yusuf al-Khal, elle poursuit
    ses études à l'Art Students League de New York, mais ce n'est qu'en 1960 qu'elle fait sa première exposition, à la Galerie
    Alecco Saab à Beyrouth. Son style devient de plus en plus expressionniste et émotionnel après la mort de sa mère et de
    son frère. En 1963, elle cofonde la Gallery One, la première galerie de ce type non seulement au Liban mais dans toute
    la région arabe orientale. Elle devient professeur à l'Université Américaine de Beyrouth et critique d'art pour le Daily
    Star et Monday Morning, . En 1987, elle publie un livre influent, The Woman Artist in Lebanon. Elle est retournée au Liban
    dans les années 1990 où elle a continué à écrire des critiques d'art. Ses autres expositions personnelles ont eu lieu
    à la Galerie Trois Feuilles d'Or, Beyrouth (1965) ; à la Galerie Manoug, Beyrouth (1968) ; à la First National Bank, Allentown,
    Pennsylvanie (1969) ; à Kaslik, Liban (1970) ; à la Contact Art Gallery, Beyrouth (1972, 1974 et 1975) et à la Bolivar
    Gallery de Kingston, Jamaïque, en 1975. Ses œuvres ont également été présentées aux Biennales d'Alexandrie et de Sao Paulo.
