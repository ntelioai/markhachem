- name: Laila Shawa
  category: Contemporary
  image: assets/images/artists/laila-shawa.jpg
  subtitle: Born in 1940, Palestine.
  bio: Born in Gaza in 1940, Laila Shawa graduated summa cum laude in Fine Arts from the Italian Accademia delle Belle Arti
    in 1964, and received a diploma in plastic arts from the Accademia San Giacomo in Rome. Between 1965 and 1967, she returned
    to Gaza to teach arts and crafts to underprivileged children. She now lives and works in London. As a Palestinian artist,
    Shawa’s concern is to reflect the political reality of her country, thus in the process, she becomes a reporter of events.
    Her work is based on a heightened sense of realism, targeting injustice and persecution. Née en 1940 à Gaza, Laila Shawa
    est diplômée de l'Académie Italienne des Beaux-Arts en 1964 avec les distinctions et reçoit en 1964 son diplôme d'art
    plastique de l'Académie San Giacomo à Rome. De 1965 à 1967, elle retourne à Gaza pour enseigner l'art et l'artisanat aux
    enfants défavorisés. Elle vit et travaille désormais à Londres.
