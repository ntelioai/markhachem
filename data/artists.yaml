- name: Jesus-Rafael Soto
  category: Modern
  subtitle: Born in 1923, Ciudad Bolivar,
  bio: 'Painter and sculptor, Soto is one of the leading exponents of the Kinetic and Optical Art movements. He was born in
    Ciudad Bolivar (Venezuela) in 1923 and received his artistic training in Caracas at the Escuela de Artes Plásticas y Artes
    Aplicadas. In 1950, he decided to leave for Paris, looking for novelties in the European art world. In France, he started
    producing his first paintings based on the repetition and progression of simple elements, whose distribution is determined
    by a system that recalls serial music. In 1955; he participates in the exhibition ''Movement'' at the Denise René Gallery
    in Paris, during the birth of the Op and Kinetic Art movements; Soto developed a kinetic vocabulary, where optical vibrations
    alter the viewer’s perception of space. The involvement of the latter is essential to the process of the breaking down
    of forms. The viewers get involved in an everlasting exchange between themselves and the art work. In 1961, Soto took
    part in the international Kinetic Art exhibition ''Bewogen Beweging'' organized by Daniel Spoerri at the Stedelijk Museum
    in Amsterdam, then later by Pontus Hulten at the Moderna Museet in Stockholm. For the occasion, he created one of the
    most spectacular pieces of the show: a large wall, constituted by three striated panels, bearing a variety of disparate
    objects (Mural, 1961). For his one-man exhibition in Paris, at the Denise René Gallery in 1967, Soto created his first
    real Penetrable, one of his major inventions, which was perfected over the years. The Museo del Arte Moderna Jesús Soto,
    in Ciudad Bolívar, opened in 1973. From 1970 until the early 90s, Soto''s works was exhibited in the Museum of Modern
    Art and the Guggenheim Museum in New York City, as well as the Centre Georges Pompidou in Paris. He died in Paris in 2005.'
  image: assets/images/artists/jesus-rafael-soto.jpg
- name: Leila Nseir
  category: Modern
  image: assets/images/artists/leila-nseir.jpg
  subtitle: Born in 1941, Syria
  bio: Born in Lattakia, Syria in 1941, Leila Nseir graduated from the Faculty of Fine Arts in Cairo in 1963. She began her
    career during the hype of Syrian modernism, developing a focus in her painting that recalls the work of the late Louay
    Kayyali, whose subject matter explored issues of life and death, as well as the experiences of the working class. Finding
    artistic inspiration in the region's ancient civilizations, she often explored mythology as an allegory for reality, delving
    into realism, expressionism and, ultimately, surrealism and abstraction, all while experimenting with different media
    and techniques. Her paintings bear the traces of these different periods of her oeuvre, indicating the path of a seasoned
    artist who has dared to frequently embark on new artistic journeys. She has an extensive exhibition history, participating
    in countless artistic events all around the world. She was a leading painter for her generation, honored by the Ministry
    of Culture for her contributions to local art in both 1968 and 1999. Nseir’s work can be found in the National Museum
    of Damascus and numerous private collections throughout the Middle East, Asia, Europe and North America. She spent most
    of her life in Syria. Née à Lattakia en Syrie en 1941, Leila Nseir est diplômée de la faculté des Beaux-Arts du Caire
    en 1963. Débutant sa carrière durant la période du modernisme Syrien, elle développe un style apparenté à celui des travaux
    tardifs de Louay Kayyali, dont les sujets principaux sont les questions de vie et de mort et les expériences de la classe
    laborieuse.
- name: Marino Di Teana
  category: Modern
  image: assets/images/artists/marino-di-teana.jpg
  bio: Born on 8th August 1920, in Teana, in Basilicat Province, near Potenza in South Italy.At age 16, emigrated to Argentina
    as a mason. At age 22, became a construction site manager. At the same time, he studied in the evening at the Salguero
    Polytechnic at the Architectural National School. Entered the Higher National School of Fine Arts Ernesto de la Carcova
    in Buenos Aires via an entrance competition. Graduated with the title of Higher Professor and obtained a professorship
    at that school. Won the Premio Mittre, equivalent to the European Grand Prix de Rome.
- name: Philippe Hiquily
  category: Modern
  image: assets/images/artists/philippe-hiquily.jpg
  subtitle: Born in 1925.
  bio: 'Philippe HIQUILY (1925-2013) is a singular French artist. A sculptor but also a furniture designer, HIQUILY has kept
    away from the art market and artistic movements. Free, hedonistic, he gives his works a spirit that is both dreamlike
    and surreal. The almost ubiquitous eroticism and the delicacy of his achievements contrast with the rawness of the recovery
    materials that serve as his basis. HIQUILY joined the National Higher School of Fine Arts in Paris in 1953. He quickly
    attended CESAR''s workshop but developed a personal approach to sculpture: he used sheet metal, which was cheaper than
    bronze, and soda by direct metal technique. Her meeting with the artist Germaine RICHIER was decisive: she advised him,
    encouraged him and even commissioned him to use pedestals and harnesses for her own sculptures. HIQUILY was quickly one
    of the young artists who made the best days of Saint germain des Prés and after two exhibitions in the Palmes and Dragon
    gallery, he was contacted by the New York gallery The Contemporaries. The exhibition, organized in 1959, was a success.
    All the works are sold and one of them is acquired by the Guggenheim Museum. His success resonated in France and, in the
    same year, his sculpture "Jeremiah" won the critics'' prize at the first biennial in Paris. In the early 1960s he was
    spotted by the decorator Henri SAMUEL and quickly became an essential reference in the decoration industry. This lucrative
    activity allowed him to continue making sculptures. From the 1980s, heavily influenced by the work of the American artist
    Alexander CALDER, he explored the question of mobility, balance, and movement. By integrating electric motors into his
    works, he breathes a new dimension into the traditional design of sculpture.'
- name: Rafael Barrios
  category: Modern
  image: assets/images/artists/rafael-barrios.jpg
  subtitle: Born in 1947, Baton Rouge, Louisiana (USA)
  bio: Rafael Barrios is a Venezuelan sculptor and one of the most renowned figures in the kinetic art movement. Born in 1947
    in Baton Rouge, Louisiana, he spent his early years in Caracas, Venezuela. Barrios began his career as a sculptor in the
    early 1970s and quickly became known for his playful, geometric forms that challenged traditional notions of sculpture.
    Barrios' work can be found in public collections around the world, including the Museum of Modern Art in New York, the
    National Gallery of Australia, and the Museum of Fine Arts in Houston, Texas. In 1975, he had his first major exhibition
    at the Sala Mendoza in Caracas, Venezuela, which established his reputation as a leading figure in the kinetic art movement.
    Barrios' kinetic sculptures are characterized by their dynamic movement and use of bright colors and geometric shapes.
    His works often incorporate mirrors and other reflective surfaces, which reflect and refract light to create complex patterns
    of movement and color. Barrios' sculptures are not only visually stunning but also invite the viewer to interact with
    them, encouraging a sense of playfulness and exploration. Barrios has exhibited his work in solo and group shows at some
    of the world's most prestigious art institutions, including the Solomon R. Guggenheim Museum in New York, the Museo Nacional
    Centro de Arte Reina Sofía in Madrid, and the Centre Georges Pompidou in Paris. His sculptures have also been featured
    in public art installations in cities around the world, including Miami, Madrid, and Singapore. Barrios' role in the kinetic
    art movement has been significant. He was part of a generation of artists who challenged traditional notions of sculpture
    and pushed the boundaries of what was possible with form and movement. His work has inspired countless artists and continues
    to be celebrated for its innovative use of color, light, and movement.
- name: Roberto Matta
  category: Modern
  subtitle: Chilean, 1911–2002
  image: assets/images/artists/roberto-matta.jpg
  bio: Roberto Matta (Chilean, 1911–2002) was a sketch artist and painter known for his work in the Abstract Expressionist
    and Surrealist movements during the 20th century. He was born Roberto Sebastian Antonio Matta Echaurren on November 11,
    1911, in Santiago, Chile. The artist studied architecture and interior design at the Pontificia Universidad Catolica de
    Chile. In 1933, Matta moved to Paris, France, to work for famed architect Le Corbusier. In 1934, he traveled to Madrid,
    Spain. There he was introduced to Salvador Dali, who encouraged Matta to show his drawings to Andre Breton. Breton and
    Dalí connected Matta to the Surrealist movement, which he officially joined in 1937. Matta had twin sons who were both
    artists, Gordon Matta-Clark and Sebastian Matta-Clark. He also had a son who is a composer, Ramuntcho Matta, and a daughter
    who is a painter, Frederica Matta. In 1938, Matta left Europe and went to New York City. During this time, his artwork
    also evolved from drawings to oil paintings, which is what he is best known for. For the next decade, the artist lived
    and worked in the United States, creating his Inscape series. Matta's connections to the Surrealist movement were severed
    over a disagreement that concerned Arshile Gorky and his family. He was accused of having a relationship with Gorky's
    wife that led Gorky to commit suicide. This led to his expulsion from the Surrealist movement, but by this time Matta
    had already made a name for himself. During the 1950s and 1960s, the artist divided his time between South America and
    Europe. His paintings combined politics with semi-Abstract Art. He tended to paint on vast canvases and created a mural
    entitled The First Goal of the Chilean People for Salvador Allende, the president of Chile at the time. Some of Matta's
    best-known work include The Road to Heaven, Storming Water River and Redness of Blue, Polimorfologia, Wound Interrogation
    and The Prophet, Dark Light, Lieberos, Nude Hiding in the Forest and Verginosamente, and La Terre Uni. Matta died on November
    23, 2002, in Civitavecchia, Italy. Roberto Matta (Chilien, 1911-2002) était un dessinateur et un peintre connu pour son
    travail dans les mouvements expressionniste et surréaliste abstraits au cours du XXe siècle. Il est né Roberto Sebastian
    Antonio Matta Echaurren le 11 novembre 1911 à Santiago du Chili. L'artiste a étudié l'architecture et la décoration d'intérieur
    à la Pontificia Universidad Catolica de Chile.
- name: Victor Vasarely
  category: Modern
  image: assets/images/artists/victor-vasarely.jpg
  bio: Victor Vasarely was a Hungarian-born French Op Art painter. He was best known as the "grandfather" of the Op Art movement
    of the 1960s. Vasarely was born in 1908 in Pecs, Hungary. He initially studied medicine, but soon abandoned the field
    to take up painting at the Podolini-Volkmann Academy. Vasarely experimented with a number of different styles before finding
    his groove in Op Art. After moving to Paris in 1930, Vasarely became a successful graphic designer, systematically exploring
    the optical and emotional scope of different graphic techniques. This led to his discovery, in 1947, that geometric forms
    could evoke a sensory perception conveying new ideas of space, matter and energy. He developed his own geometric form
    of abstraction, which he varied to create different optical patterns with a kinetic effect. The artist made grids in which
    he arranged geometric forms and bright colors in such a way that the eye perceives a fluctuating movement. This was a
    major contribution to the development of Op Art. He exhibited works regularly at the Documenta in Kassel between 1955
    and 1968. His brilliant works went mainstream in the form of posters and fabrics. Vasarely later built his own museum
    in France, which however closed in 1996, but there are several other museums in France and Hungary named after the artist.
    Né à Pécs, Hongrie, en 1906, Victor Vasarely se destine tout d’abord à la profession de médecin, mais il quitte les études
    au bout de deux ans pour se lancer dans l’art. Le Bauhaus le fascine, il étudie à l’Académie Mühely (Bauhaus Hongrois)
    à Budapest. L’influence de l’enseignement du Bauhaus sera considérable dans l’œuvre de Vasarely. En effet, durant cette
    période, il s’initie aux tendances du constructivisme et découvre l’Art Abstrait. En 1930, à l’heure des avant-gardes
    abstraites, Victor Vasarely s’installe à Paris. Il travaille comme graphiste et collabore avec de grandes agences publicitaires,
    comme Havas, Draeger et Devambez. Son travail de graphiste dans ces agences, lui permet d’aborder l’art du graphisme et
    de l’esthétique, c'est là en effet qu'il effectue son premier travail majeur, Zebra (1937) aujourd'hui considéré comme
    la première œuvre du genre de " l’Op Art " (Art Optique). Ce mouvement s’attache à suggérer le mouvement sans jamais le
    réaliser véritablement. En 1965, il participe à l’exposition « Responsive Eye » au Musée d’Art Moderne de New York, dédiée
    à l’art optique. C’est aussi par le succès dont bénéficie cette exposition, que la presse et le public consacrent Victor
    Vasarely, comme le père de l'Op-Art.
- name: Ahmad Moualla
  category: Contemporary
  image: assets/images/artists/ahmad-moualla.jpg
  bio: 'Born in Syria in 1958, Moualla is considered as one of the leading post-modern artists of Syrian expressionism. He
    was the first to introduce performance in his work and was first exhibited at Atassi Gallery in 1997, with an exhibition
    entitled ''A tribute to Saadallah Wannaous'' (a Syrian playwright). Moualla graduated from the Damascus University of
    Fine Arts and later from the École Nationale Supérieure des Beaux Arts in Paris. Since then, his works have been displayed
    in various exhibitions in Dubai, Cairo, Paris, Istanbul and Graz (Austria). Ahmad Moualla is renowned for his beautifully-painted
    and highly dramatic canvases. Moualla’s theatrical big-scale paintings deal with several themes: the relationship between
    the individual and society, the power of past and present icons, the fine line between reality and fiction, and the conscious
    and subconscious mind. Né en Syrie en 1958, Moualla est considéré comme une figure majeure des artistes post-modernes
    de l''expressionnisme Syrien, comme le premier artiste syrien à introduire la performance dans son art et premier à être
    représenté à la galerie Atassi en 1997 au sein de l''exposition "A tribute to Saadallah Wannaous" (dramaturge Syrien).
    Diplômé de l''Université des Beaux-Arts de Damas et de l''école des Beaux-Arts de Paris, l''artiste acquit une reconnaissance
    dans le monde entier en participant à des foires et expositions à Dubai, au Caire, à Istanbul, à Londres parmi de nombreuses
    autres. /* Style Definitions */ table.MsoNormalTable {mso-style-name:"Tableau Normal"; mso-tstyle-rowband-size:0; mso-tstyle-colband-size:0;
