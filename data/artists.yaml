- name: Chaouki Chamoun
  category: Contemporary
  image: assets/images/artists/chaouki-chamoun.jpg
  bio: 'Chaouki Chamoun graduated from the Fine Art Institute at the Lebanese University in 1972. First in his class, he was
    awarded a six-year fellowship to pursue his graduate studies in the United States and rejoin his faculty upon his return.
    In 1975, he got his Master in Fine Arts from Syracuse University (New York). From 1975 to 1979 he was a full time fellow
    at the New York University, attending a PhD program on Aesthetics and Studio Art. Chamoun has had over thirty One-Man
    Shows since 1975, exhibiting in New York, Beirut and other cities in the United States, Europe, Hong Kong and the Arab
    World. He is represented by Mark Hachem Gallery in Beirut. He also participated in over 55 group Art Shows and biennales
    since 1968 including: Rochester Memorial museum (1974), Lowe Art Centre in Syracuse (1975), Soursouk Museum in Beirut
    (1984-2008), Europ’Art in Geneva (1999), Sotheby’s Exhibit and Auction in London (Oct. 2007), Christie’s Exhibit and Auction
    in Dubai (October 2007 and April 2008), Art-Paris in Abu Dhabi (2007-2008), Alexandria Biennale (2008), The Katzen Art
    Museum in Washington DC (2010) and Abu Dhabi Art fair, and the MENASA art fair in Beirut (2010-2012). Chaouki Chamoun
    reçu son enseignement des hautes études de l''Institut des Beaux-Arts de l''Université libanaise en 1972. Premier de sa
    classe, il bénéficia d''une bourse d''étude de six ans pour poursuivre ses études aux Etats-Unis puis rejoindre son université à
    son retour. En 1975, il valide son Master des beaux-Arts à l''Université de Syracuse, NY, puis suit le programme PhD à l''Université
    de New-York, se concentrant sur l''esthétique et les Beaux-Arts. Depuis 1975, Chamoun a participé à plus d''une trentaine
    d''expositions solo à New York, Beirut, en Europe et dans le monde Arabe, représenté par la galerie Mark Hachem. Par ailleurs,
    il participa à plus de cinquante expositions collectives depuis 1968 incluant le mémorial de Manchester (1974), Syracuse
    (1975), le musée de Sursock a Beyrouth (1984-2008), Europ''Art a Geneve (1999), les ventes aux enchères de Sotheby''s à Londres
    ( 2007) et de Christie''s à Dubai en 2007 et 2008, Art Paris et Art Abu Dhabi ( 2007-2008), la biennale d''Alexandrie
    (2008), le Musee de Washington (2010) ou encore MENASA Art Fair a Beirut ( 2010-2012). /* Style Definitions */ table.MsoNormalTable
    {mso-style-name:"Tableau Normal"; mso-tstyle-rowband-size:0; mso-tstyle-colband-size:0; mso-style-noshow:yes; mso-style-priority:99;
