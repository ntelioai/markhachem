- name: Marck
  category: Contemporary
  image: assets/images/artists/marck.jpg
  bio: 'in Zurich, Switzerland, Marck is a contemporary artist best known for his work in video sculptures. His early journey
    in the arts was unconventional—after enrolling in a prestigious art school, he left due to dissatisfaction with formal
    education. He then explored various careers including auto dismantling, mechanical electrician, rock singer, and tech
    installation designer. These diverse life experiences deeply influenced his approach to art, allowing him to blend sculpture,
    video, and technology to create works that explore themes of societal constraints. Marck''s work in the 1990s initially
    focused on video installations for clubs in Zurich, but over time, his artistic practice evolved. Dissatisfied with traditional
    content and its boundaries, he sought to dissolve the lines between content and medium. He eventually began creating sculptures
    where the medium itself became the content and the message. Marck’s works often feature women depicted in confined, narrow
    spaces, expressing themes of struggle, freedom, and the emotional complexities of existence. His video sculptures, shown
    at renowned art spaces such as the ZKM in Karlsruhe and the Museum of Fine Arts in Boston, challenge viewers to reflect
    on societal pressures and identity. His works engage with themes of design, video, women, and interactive narratives,
    drawing inspiration from video art pioneers. Today, Marck continues to innovate, constantly pushing the boundaries of
    video, sculpture, and audience interaction, creating immersive experiences that invite viewers to explore modern life''s
    emotional and psychological states. Né en 1964 à Zurich, en Suisse, Marck est un artiste contemporain principalement connu
    pour ses sculptures vidéo. Son parcours artistique a été peu conventionnel : après s''être inscrit dans une école d''art
    prestigieuse, il en est parti, insatisfait de l''éducation formelle. Il a ensuite exploré diverses carrières, notamment
    le démantèlement automobile, électricien mécanique, chanteur de rock et designer d''installations techniques. Ces diverses
    expériences de vie ont profondément influencé son approche de l''art, lui permettant de fusionner sculpture, vidéo et
    technologie pour créer des œuvres qui explorent les thèmes des contraintes sociales. Dans les années 1990, le travail
    de Marck se concentrait initialement sur des installations vidéo pour des clubs à Zurich, mais avec le temps, sa pratique
    artistique a évolué. Insatisfait du contenu traditionnel et de ses limites, il a cherché à dissoudre les frontières entre
    le contenu et le médium. Il a finalement commencé à créer des sculptures où le médium lui-même devenait le contenu et
    le message. Les œuvres de Marck présentent souvent des femmes figurées dans des espaces confinés et étroits, exprimant
    des thèmes de lutte, de liberté et de complexités émotionnelles de l''existence. Ses sculptures vidéo, présentées dans
    des lieux artistiques renommés tels que le ZKM de Karlsruhe et le Museum of Fine Arts de Boston, invitent les spectateurs
    à réfléchir aux pressions sociales et à l''identité.'
- name: Mathias Schmied
  category: Contemporary
  image: assets/images/artists/mathias-schmied.jpg
  bio: Mathias Schmied est diplômé des beaux-arts de Lyon. Les comics, les posters vintage de pin up, le papier préalablement
    peint à la bombe, le métal. Il enlève et découvre, invente un second propos, joue sur l'ambiguïté du sens et des mots.
    Dans "les ruines", les mots choisis ont la force de frappe du "slogan" et s'en éloignent aussitôt pour tendre vers une poésie
    du vide découpé. L'absence devient sujet. Depuis longtemps, la préoccupation de l'artiste n'est plus de parvenir à découper
    parfaitement une courbe de quelques mm de large sans accident (ici, l'erreur est irréparable et obligerait à tout jeter),
    mais plutôt d'utiliser ce savoir faire - cette autre façon de dessiner - pour parvenir à des effets précisément recherchés.
    La technique complexe sert une multitude de propos, de questionnements. Tantôt une atmosphère, une mélancolie, une colère,
    une vanité, tantôt un discours politique, une feinte, un paradoxe... Voir toutes les lettres de la série des Ruines tenir
    ensemble et composer "Point de Rupture" ou encore " On the edge of nothing more", en ayant pourtant l'illusion qu'elles
    ont été jetées au hasard sur le sol, est particulièrement troublant. "Lost In" flotte au dessus de your picture... C'est
    pourtant le même papier, une seule feuille, une seule épaisseur. Illusion 3D où une unique phrase, répétée ad nauseam,
    se détache et, au delà du sens, joue son rôle plastique, compose révèle et dissimule, éclaire et assombrit. Expérience
    unique d'une poésie violente où les ombres portées sont les fantômes de cris, de rires, de pamphlets qui apparaissent
    parmi les absences cernées de pin-up morcelées. Des cases vides des comics aux phrases se détachant d'un tourbillon de
    lignes et de vides - "Never say goodbye" - Mathias Schmied est un des artistes français les plus singuliers et passionnants.
    Bref, un des plus talentueux. "Up, Please Shut.. "
