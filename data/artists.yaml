- name: Ghazi Baker
  category: Contemporary
  image: assets/images/artists/ghazi-baker.jpg
  bio: Ghazi Baker (1967) is a self-taught artist in addition to being a practising architect and manager of his own firm,
    CC&A. Since his early teens, he has been in a constant state of communion and renewal with the world around him, always
    learning and intellectualising new experiences. Born in Beirut with Iranian and Armenian heritage, Baker was raised and
    formed in part during the Lebanese Civil War. He spent some of his youth in Europe, where he cultivated a love for art,
    travel, and adventure, as well as a passion for photography and biking that grew into a source of inspiration and evolving
    self-awareness. Baker’s style can be characterised as an exotic cocktail of lines and forms based in post-structuralism.
    His work is cerebral and deliberately anti-thematic, juxtaposing lighthearted visuals with deeply human concepts and influences
    to portray an aesthetic contradiction that reflects the human condition without imposing upon it. Influenced by a varied
    range of sources such as comic book art, music, films, motorcycle culture, esoteric imagery, and everyday life, Baker
    searches for new ways to highlight the artistic process itself. His oeuvre is inspired by great thinkers such as J. Derrida,
    M. Foucault, and M. Merleau-Ponty, as well as by other artists including Francis Bacon and David Salle. Baker’s work is
    highly sought after by major collectors in the Middle-East, Europe, and beyond. His art is featured in institutional and
    foundation collections in such cities as Beirut and Dubai, among others, and more recently, his works were featured at
    private auctions, where they easily exceeded set reserves. Additionally, he was invited this year to exhibit his work
    at the Rijksmuseum in Amsterdam, where his painting was shown in the hall of honour. Baker’s legacy in the art world continues
    to grow, as his striking pieces reflect the paradoxical simplicity and complexity he sees in daily life.
