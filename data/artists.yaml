- name: Yves Hayat
  category: Contemporary
  image: assets/images/artists/yves-hayat.jpg
  bio: 'Originally from Egypt, Yves Hayat first developed his aesthetic sensibilities living in a country enriched with history
    and cultural diversity. Art was his first love. In 1956, after the Egyptian Revolution, Hayat left for France. For five
    years, he studied Art at the Ecole Nationale des Arts Décoratifs of Nice. In 1973, Hayat chooses to go into advertising
    and marketing, which led him to open his own agency. The creative trade captivated Hayat. His experience in the field
    also enabled him to discover and learn to use new forms of technology, and master his techniques. In the 1990s, equipped
    with those skills, he decided to return to art, rediscovering the old masters, photographing people, the streets, society
    products, museum paintings and recuperating magazine and web images, which are carefully classified. Hayat is a perfect
    example of his time: an open mind on society, its streets, its media, its internet. While running his successful advertising
    business, he starts to show his artwork in galleries. Soon, his art practice took precedence over his profession, which
    he ended in 2002. Although Yves Hayat does not consider himself a painter, photographer, or designer, he is widely known
    as a “plasticien,” an untranslatable French term that refers to an artist who puts the meaning of his work to the fore
    and uses all the various media and techniques to express it. As François Birembaux wrote, Yves Hayat belongs to that category
    of remarkable artists who have something to say, and who say it with such talent that they stamp their impression on the
    art of our time. His works, modern and contemporary, are however, the product of a deeply classical culture. Thanks to
    all the techniques which belong to our time: photography, superimposition of images, etc., he creates an original work
    rooted in the human cultural heritage but which, through the strength of its subjects, conveys every dimension of our
    era. Through a strictly artistic approach, Yves Hayat expresses a philosophical thought, not in complicated words but
    by speaking to our senses, in a clear, untortured way. He presents the essence of our human condition and of our time,
    bringing out its distinctive characteristics and its violence (…)'
- name: Yves ULLENS
  category: Contemporary
  image: assets/images/artists/yves-ullens.jpg
  subtitle: Born in 1960 in Brussels (Belgium)
  bio: Yves Ullens de Schooten’s photographic approach is aimed at tracking down forms of light. These lights radiate from
    day to day objects and experience. By instinct, the artist captures them and restores their energy and colors, while refusing
    to adulterate them with any graphic palette effects. What captivates him, is to grasp the intensity of light inherent
    in every situation, object or landscape (even the most common ones), and disclose its subtlety and force in a simple way.
    His photos are almost paintings, responding to the same aesthetic quest and reflecting the same intensity. They are an
    invitation to discover and revel in pure visual sensations. They also involve a metaphysical vision of the subject which
    emerges through the prism of light. This boldly positive and optimistic vision of reality is left to everyone’ s direct
    and unconstrained interpretation, for everyone has in his or her intuition the tools to read through this abstract representation.
    In his works, Yves Ullens de Schooten is not trying to convey an esoteric vision, but to offer visual sensations and arouse
    vibrations that do one good, as they brighten up daily life, and by stripping off its banal appearance, give it a new
    dimension. Yes, his photos are definitely beaming, not only in that they depict light, but also shed light upon us and
    through some sort of magic manage to make us happy. L’approche artistique de Yves Ullens est basée sur la forme créée
    par la lumière. Ces rayons reflètent sur des objets de la vie quotidienne. De manière instinctive, l’artiste capture cette
    lumière et lui redonne son énergie et ses couleurs mais refuse de modifier la forme en utilisant un autre motif. Ce qui
    le fascine, c’est de saisir l’intensité de la lumière dans toutes les situations, que ce soit des objets ou des paysages
    (même les plus banals). Ces photos sont presque comme des peintures, répondant aux mêmes désirs esthétiques et renvoyant
    la même intensité. Elles sont une invitation à découvrir et révéler la pure sensation de contemplation. Elles convoquent
    aussi une vision métaphysique du sujet, qui émerge grâce à la lumière. Sa vision positive et optimiste de la réalité est
    laissé à la libre interprétation car chacun possède les outils pour comprendre cette représentation abstraite.
