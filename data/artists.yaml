- name: CLAUDE GILLI
  category: Modern
  image: assets/images/artists/claude-gilli.jpg
  subtitle: Born in 1938, Nice, France
  bio: Claude Gilli is born in Nice in 1938. He enters the School of Decorative Arts in Nice in 1955. In 1957, he meets Albert
    Chubac and his first exhibition is organized with him and Martial Raysse ("Painters of twenty years" at the gallery Longchamp
    Nice). In the wake of Raysse, Gilli begins to work at the School of Nice in the sixties. Abandoning the painting to assemblages
    of constructed objects, he produces - from 1961 - a long series of "Ex-votos”; his first work in painted carved wood,
    this period marks the commitment of the artist to the adventure of creation. The following year, Gilli burns almost everything
    he has done before, marking his commitment to establish a true starting point. Arman, Ben, and Raysse allow him to participate
    in his first Parisian exhibition (Gallery Henriette Legendre), he makes the acquaintance of Robert Malaval. Gilli, in
    the early sixties, began a series of landscapes carved wood. The artist engages frantically in the use of the blue color,
    a color found throughout his work. He participates in several exhibitions in Nice with Albert Chubac, Robert Malaval,
    and Bernar Venet, and meets Jacques Matarasso who becomes one of his leading merchants. Arising out of his earliest works,
    a desire to leave the "framework" of the painting is expressed in his art, a desire ever-present throughout his work.
    In a similar spirit, Claude Gilli performs the "Showcases" cutting volumes in thin planks of violently colored wood. In
    1965, he also experiments with his first carved wood "Coulées" which enables him to be successful. Letterings appear in
    the cuttings of Claude Gilli in 1966, lettering borrowed from the world of teaching. That same year, his first solo exhibition
    is held at Gallery Yvon Lambert. In 1967, he participates in the exhibition "12 Great Realists" in Venice Gallery Del
    Leone, where he discovers the work of American Pop Art (Lichtenstein, Warhol, Wesselman). Gilli starts a new work phase
    in rupture with the previous period of colored wood, and his first work on transparent plexiglass appears in 1968. From
    1969 to 1971, Gilli experiences working with "Snails" which he says have met on the Saleya market (Nice). He realizes
    castings, snails invading the surface of the table, then watercolors, by the necessity of means imposed by gastropods.
- name: Dario Perez-Flores
  category: Modern
  image: assets/images/artists/dario-perez-flores.jpg
  subtitle: Born in 1936, Valera, Venezuela
  bio: 'v\:* {behavior:url(#default#VML);} o\:* {behavior:url(#default#VML);} w\:* {behavior:url(#default#VML);} .shape {behavior:url(#default#VML);}
    Born in 1936 in Valera, Venezuela. He studied at the School of Fine Art in Valencia, Venezuela. He made abstract sculptures
    from recuperated metal. In the 50s, he studied at the University of Caracas. He entered the university to study literature,
    but he arranged to have access to the metal workshop at nights and on the weekends. He concentrated on making abstract
    sculptures that are notably a series of chrome-plated mobile half-spheres that were exposed at Studio Actual in Caracas.
    After that, thanks to a scholarship, he moved to France where he chose to study Fine Art at the University of Vincennes.
    In collaboration with an Italian workman, he created a series of geometric sculptures in Plexiglass that were exhibited
    in Switzerland in 1972. He also participated in an exhibition at the Venezuelan Embassy in Paris with Cruz-Diez. He then
    created the famous mobiles where, by means of an engine system, black and white horizontal and vertical lines are moved
    on a black background. Then the optical movement replaces the engines at the same time that the black and white gives
    place to the color. It is the period of the Prochromatic: colored verticals at the front of which are placed fine iron
    rods that are supposed to materialize the vanishing points.'
