- name: Nedim Kufi
  category: Contemporary
  image: assets/images/artists/nedim-kufi.jpg
  bio: 'Nedim Kufi was born in Baghdad, Iraq in 1962. He moved to the Netherlands in 1994 where he has been living and working
    as a multidisciplinary visual artist since. Kufi completed a degree in graphic design and multimedia at HKU in 2002 and
    has since participated in international shows and events around the world. Nedim Kufi’s work often compares Middle Eastern
    and European culture through images and thoughts vested in ambiguity and paradox. Kufi seeks gaps internationally within
    rationality, similarity and contradiction. A strong believer in minimalism, Kufi hopes to influence the audience’s perception
    through repetition and overlapping structures. He aims at reminding the viewers of their identities, cognition and social
    experiences. Through his recent works, Kufi manifests the narration of cultural identity in a historic dimension. He underwent
    a long journey of drawing and re-editing of Islamic art patterns, most of his work is a reference of that influence and
    an expression of the pride he puts into that history. To him, Al Hambra is not only an inspiring place and an artwork
    but also a lifestyle, with which he fostered the development of a distinctive method with his own unique artistic language.
    His work is not based under one flag, his spirit is completely free and open, changing under circumstances. It is completely
    beyond the concept of identity or any other belonging. Kufi believes that art is the solution and communicator, it is
    created with passion and a bilingual visionary. Nedim Kufi est né à Bagdad (Iraq) en 1962. Il a déménagé aux pays-Bas
    en 1994, d’où il vit et travaille aujourd’hui comme un artiste multidisciplinaire. Kufi a obtenu un diplôme en design
    graphique et multimédia à KHU en 2002. Depuis, il participe à des évènements internationaux à travers le monde. Le travail
    de Nedim Kufi compare sans cesse la culture de l’Europe et du Moyen Orient dans des images à la fois directe et paradoxale.
    Kufi recherche les différences culturelles avec rationalité, à la fois dans la ressemblance et la contradiction. Se basant
    sur une esthétique minimaliste et une structure répétitive et superposée, Kufi espère faire changer l’opinion des spectateurs :
    il vise à leurs rappeler leurs identités'
- name: Polles
  category: Contemporary
  image: assets/images/artists/polles.jpg
  subtitle: Born in 1945, France
  bio: '/* Style Definitions */ table.MsoNormalTable {mso-style-name:"Tableau Normal"; mso-tstyle-rowband-size:0; mso-tstyle-colband-size:0;
    mso-style-noshow:yes; mso-style-priority:99; mso-style-qformat:yes; mso-style-parent:""; mso-padding-alt:0cm 5.4pt 0cm
    5.4pt; mso-para-margin-top:0cm; mso-para-margin-right:0cm; mso-para-margin-bottom:10.0pt; mso-para-margin-left:0cm; line-height:115%;
    mso-pagination:widow-orphan; font-size:11.0pt; font-family:"Calibri","sans-serif"; mso-ascii-font-family:Calibri; mso-ascii-theme-font:minor-latin;
    mso-fareast-font-family:"Times New Roman"; mso-fareast-theme-font:minor-fareast; mso-hansi-font-family:Calibri; mso-hansi-theme-font:minor-latin;}
    Pollès is a French sculptor born in Paris in 1945. He is considered the inventor of the “Organic Cubism”. Fascinated by
    anatomy, he studied medicine and also attended drawing classes at the Academy Charpentier. In 1966, he discovered sculpture
    from a friend, the sculptor Enzo Plazota. He affirmed: “overnight, as soon as I discovered form, I felt that I could give
    up everything for it.” In 1970, he went to Carrara and has lived ever since in Pietrasanta. A few years later, he created
    his own foundry and almost exclusively uses bronze for his works. His creations represent a continuity to the tradition
    of Greek sculpture. They could be considered as a short-circuit between Brancusi''s purity, Henry Moore''s figurative
    abstraction and Modigliani''s lines and forms. His love for the female figure, for sensuality, complexity, and shape led
    him to explore the female form. Since the beginning of his career, Pollès has created a singularly stylized cubist form,
    which became his signature.'
- name: Raffi Yedalian
  category: Contemporary
  image: assets/images/artists/raffi-yedalian.jpg
- name: Sara Shamma
  category: Contemporary
  image: assets/images/artists/sara-shamma.jpg
  subtitle: Born in 1975, Damascus (Syria)
  bio: 'Sara Shamma is a renowned painter whose works can be found in both public and private collections around the globe.
    Shamma was born in Damascus, Syria (1975) to a Syrian father and Lebanese mother. She graduated from the Painting Department
    of the Faculty of Fine Arts, University of Damascus in 1998. She moved to London in 2016 under the auspices of an Exceptional
    Talent Visa where she currently lives and works. Shamma’s practice focuses on death and humanity expressed mainly through
    self- portraits and children painted in a life-like visceral way. The Syrian conflict has a distinct impact on the way
    that Shamma portrays her subjects. Working mainly from life and photographs, the artist uses oils to create a hyper realistic
    scene, using transparency lines and motion to portray a distant and deep void. Shamma has previously taught at the Adham
    Ismail Fine Arts Institute in Damascus, and alongside her practice has always had a strong dedication to sharing her knowledge
    with the next generation of artists. She was a member of the jury for The Annual Exhibition for Syrian Artists held by
    the Ministry Of Culture, in Damascus, 2006. Shamma believes in helping others and has been supporting the United Nations
    World Food Program since 2010, during which time she produced Fighting Hunger., sold by Christie’s Dubai in 2012 with
    all proceeds going to the WFP. Shamma has participated in a number of solo and group exhibitions including: World Civil
    War Portraits, The Old Truman Brewery (London, 2015); Diaspora, Art Sawa Gallery (Dubai, 2014); Q, Royal College of Art
    (London, 2013); Birth, Art House (Damascus, 2011); Love, 360 MALL (Kuwait, 2009); The Royal Society of Portrait Painters
    Annual Exhibition, The Mall Galleries (London, 2013); Nord Art 2012 organized by KiC – Kunst in der Carlshütte (Büdelsdorf,
    2012); UAE Through Arabian Eyes, (Dubai, 2008); Syrian Artists, Souq Wakef Art Center (Doha, 2008); Panorama of Syrian
    Arts, Catzen Arts Centre at The American University (Washington D.C, 2007); International Painting Prize of the Castellon
    County Council, (Castellon 2005), Castellon and the Municipal Arts Centre of Alcorcon, (Madrid, 2005-2006); Women and
    Arts, International Vision, Expo Sharjah (Sharjah, 2005). Art Awards include 1st prize in Latakia Biennial, Syria (2001),
    4th prize BP Portrait Award, National Portrait Gallery, London (2004), 1st prize The Waterhouse Natural History Art Prize,
    The South Australian Museum (2008), and a painting prize at the Florence Biennial (2013).'
- name: Shawn Smith
  category: Contemporary
  image: assets/images/artists/shawn-smith.jpg
  bio: Shawn Smith was born in 1972 in Dallas, TX where he attended Arts Magnet High School and Brookhaven College before
    graduating from Washington University in St. Louis, MO with a BFA in Printmaking in 1995. Smith received his MFA in Sculpture
    from the California College of the Arts in San Francisco in 2005. He has received artist-in-residencies from the Kala
    Art Institute in Berkeley, CA, and the Cite Internationale des Arts in Paris, France. In 1996, Smith was a recipient of
    the Clare Hart DeGolyer grant from the Dallas Museum of Art. Smith’s work has been exhibited at Hå Gamle Prestegard,
    National Art and Culture Center of Norway, Gallery Mark Hachem (Paris, France), Kuntsi Museum of Modern Art, (Vaasa, Finland),
    and throughout the United States including the Austin Museum of Art, Yerba Buena Center for the Arts (San Francisco),
    Dean Lesher Center for the Arts (California), Northwest Art Center (North Dakota), and the Armory Art Center (Florida),
    among others. In 2006, Smith was commissioned to create a monumental public sculpture in San Francisco, CA. In 2017, he
    was commissioned to create Convergence, consisting of 100 sculptures for the new NYPL Westchester Square Library in the
    Bronx, for which he received a 2018 NYC Excellence in Design Award from the New York Public Design Commission. In July
    2019, he installed Burning Bright, a 71-foot-long powder-coated steel panther at Fire Station 42 in Fort Worth, Texas.
    He is currently in the fabrication phase for an 18-foot-tall pixelated giraffe commissioned by the US Department of State
    for their Art in Embassies Program. In addition to his public artworks, Smith has received commissions to create works
    for many private and corporate clients including Facebook, Microsoft, Adobe, Fidelity Investments, Boston Consulting Group,
    W Hotels, Frost Bank, and Wired Magazine-UK, among others. His work is in the permanent collection at the Smithsonian
    American Art Museum, Renwick Gallery in Washington DC, the National Museum of Wildlife Art in Jackson Hole, Wyoming, the
    Explora Science Museum in Albuquerque, NM, and the Nasher Sculpture Center in Dallas, TX. His works have also recently
    been acquired by the Kuntsi Museum of Modern Art, Finland. Shawn Smith est né en 1972 à Dallas, Texas, où il a fréquenté
    l'Arts Magnet High School et le Brookhaven College avant de recevoir son diplôme de la Washington University de St. Louis,
    avec un Baccalauréat des Beaux-Arts en gravure en 1995. En 2005, Smith obtient son Master des Beaux-arts en Sculpture
    au California College of Arts de San Francisco. Il bénéficie de résidences d'artiste au Kala Art Institute de Berkeley,
    en Californie, et à la Cité Internationale des Arts à Paris. En 1996, Smith reçoit la bourse Clare Hart DeGolyer du Dallas
    Museum of Art. Les œuvres de Smith ont été exposées à Hå Gamle Prestegard, le centre national d'art et de culture de Norvège,
    à la galerie Mark Hachem (Paris, France), au Musée de l'Art Moderne de Kuntsi (Vaasa, Finlande) et dans tous les États-Unis,
    notamment au Austin Museum of Art, à l‘Arthouse au Jones Center (Austin), au Galveston Art Center, au Yerba Buena Center
    for the Arts (San Francisco), à Southern Exposure (San Francisco), au Grand Rapids Art Museum, au Oakland Arts Museum,
    Berkeley Art Center, Richmond Art Center, di Rosa Art and Nature Preserve (Napa), Dean Lesher Center for the Arts (Californie),
    Holter Museum of Art (Montana), Northwest Art Center (Dakota du Nord), Lawndale Art Center (Houston), Wichita Falls Museum
    of Art (Texas), l'Armory Art Center (Floride), Scion Installation Center (Los Angeles), au Grace Museum (Abilene, TX),
    Artisphere (Arlington, VA) et au McKinney Avenue Contemporary (Dallas), entre autres. En 2006, Smith a été chargé de créer
    “Doppel Fountain”, une sculpture publique monumentale à San Francisco. En 2017, il a été chargé de créer “Convergence”,
    composé de 100 sculptures pour la nouvelle bibliothèque NYPL Westchester Square dans le Bronx, pour laquelle il a reçu
    le prix NYC Excellence in Design 2018 de la New York Public Design Commission. En juillet 2019, il a installé “Burning
    Bright”, une panthère en acier thermolaqué de 21,6 mètres de long à la caserne de pompiers 42 de Fort Worth, au Texas.
    Toujours en 2019, il a créé “Tower,” une girafe pixelisée de 5,4 mètres de haut, commandée par le Département d'État américain
    pour son programme Art in Embassies, qui sera installée à Niamey, au Niger.
