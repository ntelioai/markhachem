- name: Alfred Basbous
  category: Modern
  image: assets/images/artists/alfred-basbous.jpg
  subtitle: Born in 1924, Rachana, LEBANON.
  bio: Alfred Basbous was born in Rachana in 1924. His first exhibition in Beirut, at the Alecco Saab gallery in 1958, marked
    the beginning of his success and introduced him into the world of sculpture.In 1960, he received a scholarship from the
    French government and became a pupil of the sculptor René Collamarini at "The National Fine Arts School in Paris" (L'Ecole
    Nationale des Beaux-Arts in Paris). In 1961, his works were included in the International Sculpture Exhibition at the
    Musée Rodin, in Paris. From 1994 to 2004, Basbous organized the International Symposium of Sculpture in Rachana, where
    famous sculptors from around the world were invited to create, sculpt and exhibit their works alongside his own. Throughout
    his life, Basbous won many awards including the "Prix de l'Orient" in Beirut in 1963 and the price of Biennale in Alexandria
    in 1974. When he died in 2006, the President of the Lebanese Republic, in order to honor him, awarded him the "Medal of
    the Lebanese Order of Merit in Gold." Basbous's works are particularly touching because they exude deeply ingrained sincerity.
    Focused on the aesthetic principles of shape, movement, line, material and harmony, his sculptures are marks of genuinity
    and acceptance of beauty. This clairvoyance and aversion towards frivolous and meaningless embellishments echo his own
    philosophy of aisance and simplicity. The works of Alfred Basbous are part of the permanent family exhibition in Rachana,
    Lebanon. His monumental works are present in the public areas of Beirut and many Lebanese cities, acquired through municipalities
    and private projects.
- name: Antonio Asis
  category: Modern
  image: assets/images/artists/antonio-asis.jpg
- name: Arman
  category: Modern
  image: assets/images/artists/arman.jpg
  bio: 'Arman is most recognized for his contribution to the Nouveau Realisme movement, which represented France’s response
    to American Pop Art in the 1960’s. After studying archeology and Eastern Art at the Ecole du Louvre, Arman began painting
    in a lyrical and abstract style. His work soon evolved into free-form sculpture, comprised of found metal objects, which
    the artist welded together. From 1959 to 1962, Arman developed his most recognizable style, based on two key concepts:
    "Accumulation" and "Poubelle". Both of these styles were influenced by the Dada concept of found-objects, most famously
    employed by Marcel Duchamp (Arman’s friend and mentor). The artist was fascinated by the cycle of purchase and destruction,
    regulating the modern Western world. He wrote: “As a witness of my society, I have always been very much involved in the
    cycle of production, consumption, and destruction.” This fascination with the contrast between creation and destruction
    is one of Arman’s major themes, and is the underlying thread through his series of smashed musical instruments and pottery.
    In 1961, Arman moved to downtown New York City, where he spent the rest of his life working in collaboration with other
    modernist artists, most notably Andy Warhol, Yves Klein, Daniel Spoerri, and William Copley. Arman, de son nom Armand
    Fernandez, est né en 1928 à Nice.'
- name: Carlos Cruz Diez
  category: Modern
  image: assets/images/artists/carlos-cruz-diez.jpg
  bio: 'The Franco-Venezuelan artist Carlos Cruz-Diez (Caracas, 1923) has lived and worked in Paris since 1960. He is a major
    protagonist in the field of Kinetic and Optical art, a movement that encourages “an awareness of the instability of reality.”
    Carlos Cruz-Diez graduated from the School of Visual Arts and Applied Arts, Caracas, in 1945. While still at art school,
    he worked as an illustrator for popular Venezuelan newspapers and magazines such as La Esfera, Elite, and El Farol. From
    1946 to 1955, he was the creative director at the Caracas branch of McCann-Erickson, the international advertising agency,
    and contributed illustrations to the Venezuelan newspaper El Nacional. He first went to Europe in 1955 and lived in El
    Masnou (Cataluña, Spain), where he began a defining phase in his career, creating his earliest abstract compositions (Parénquimas)
    and his first Objetos Rítmicos Móviles [Mobile Rhythmic Objects]. He visited Paris that same year, where he saw the Le
    Mouvement exhibition at the Galerie Denise René. In 1956 he quit producing figurative social protest painting and returned
    to Venezuela, where he opened the Estudio de Artes Visuales, a visual arts studio for graphic and industrial design. It
    was during that period that Carlos Cruz-Diez started developing the conceptual platform for his work based on optical
    and chromatic phenomena, a process that led to the creation of his first Color Aditivo [Additive Color] and Fisicromía
    1, in 1959. He and his family settled in Paris in 1960, where he met and discussed his ideas with international artists
    such as Agam, Tinguely, Soto, Buri, Picelj, Morellet, Camargo, Lygia Clark, Le Parc, Calder, and Vasarely. Carlos Cruz-Diez
    articulated his exploration of the phenomenon of color in eight projects: Couleur Additive [Additive Color], Physichromie,
    Induction Chromatique [Chromatic Induction], Chromointerférence [Chromo-Interference], Transchromie, Chromosaturation,
    Chromoscope, and Couleur à l’Espace [Color in Space]. His works present color as an autonomous reality that evolves in
    space and time, unaided by form or support, in a perpetual present. In the late 1960s, he produced a number of installations
    for urban landscapes in Caracas, Miami, Washington, Houston, Paris, Seoul, Sao Paulo, Panama, and Madrid, among other
    metropolitan areas. In his book Reflexión sobre el color [Reflection on Color] (Caracas, 1989), he clearly and succinctly
    outlines the evolution of his pictorial and theoretical process.'
