- name: WOLFGANG STILLER
  category: Contemporary
  image: assets/images/artists/wolfgang-stiller.jpg
  subtitle: Born in 1961, Wiesbaden, Germany
  bio: 'Internationally known for his ‘’Matchstickmen’’ series, Wolfgang Stiller is a German artist, born in 1961, in Wiesbaden.
    His artworks encompass sculpture, drawing, and installation, displaying a complicated but subtle interest in bodies and
    organisms, human and otherwise, via scale, subject, and materiality. Between 1981 and 1984, Stiller studied communication
    design at the GHS Wuppertal and later he pursued his education in Fine Arts at the "Kunstakademie Düsseldorf". The artist
    traveled and worked in many countries, notably Turkey, the United States, and China, where he lived for two years and
    worked as a guest professor at the New York University (NYU - Shangai Campus). He found inspiration there from the suppressive
    system of the Chinese government. Stiller actually started the ‘’Matchstickmen’’ series in China which resulted inall
    of them having Asian faces but the link between this work and China stops here. The artist likes to see this work more
    as a general commentary on society, more about the waste of human resources and the impermanence of our human existence,
    and not only as a critique of the Chinese system. Stiller is now based in Berlin, Germany. His work appears internationally
    in several renowned public and private collections. The series "Matchstickmen" has two possible interpretations, firstly
    it is a clear criticism of modern society, in particular the way we take care of ourselves and other human beings, he
    exposes in particular the bad treatment of great multinational companies who exploit hardly their employees. The other
    interpretation, much lighter, is about "Streichholzkopf" (Matchstick in German), which is directly connected to the human
    body: in fact "Kopf" literally means "the Head". Internationalement connu pour sa série "Matchstickmen", Wolfgang Stiller
    est un artiste allemand né en 1961 à Wiesbaden. Ses œuvres englobent la sculpture, le dessin et l''installation; elles
    témoignent d''un intérêt complexe mais subtil pour les corps et les organismes, humains ou pas, par le biais de l’équilibre
    entre le sujet et la matérialité. Entre 1981 et 1984, Stiller a étudié le design de communication à la GHS de Wuppertal,
    avant de poursuivre sa formation en beaux-arts à la "Kunstakademie Düsseldorf". L''artiste a voyagé et travaillé dans
    de nombreux pays, notamment en Turquie, aux États-Unis et en Chine, où il a vécu pendant deux ans et travaillé comme professeur
    invité à la New York University (Shangai Campus). Il trouve son inspiration dans le système de répression sistématique
    du gouvernement chinois. Stiller a en effet commencé la série des "Matchstickmen" pendant son séjour en Chine, ce qui
    fait que tous les personnages ont des visages asiatiques, mais le lien entre ce travail et la Chine s''en arrête là, car
    l''artiste aime considérer ce travail comme un commentaire sur la société moderne en général, sur le gaspillage des ressources
    humaines et sur la fragilité de l''existence humaine, et non pas seulement comme une critique au système chinois. Stiller
    est aujourd''hui installé à Berlin, en Allemagne. Ses œuvres figurent maintenant dans plusieurs collections publiques
    et privées de renom.'
