- name: Jose Margulis
  category: Contemporary
  image: assets/images/artists/jose-margulis.jpg
  subtitle: Born in 1970 in Caracas, Venezuela, he studied photography in
  bio: in Caracas, Venezuela, he studied photography in college before working for his family’s digital printing business.
    Combining these two skills with his interest in sculpture, Margulis began making works in dialogue with the artists Jesús
    Rafael Soto and Naum Gabo. The artist currently lives and works in Miami, FL. "Writings on the Wall" is a captivating
    exploration that seamlessly merges kinetic, optic, and abstract geometry art with the intellectual prowess of double entendre.
    At its core, this mixed-media piece invites viewers to confront the dynamic interplay between written text, visual perception,
    and the nuanced layers of meaning concealed within its geometric tapestry. The artwork's title serves as both a literal
    descriptor and a metaphorical call to action. "Writings on the Wall" is not merely a phrase but an integral part of the
    visual narrative, inscribed on the artwork's surface. This act of transparency, however, veils a deeper proposition –
    the idea that all evidence is laid bare for those brave enough to confront it. Visually, the piece is an arrangement of
    geometric patterns, optical illusions, and layered typography. The repetition of written characters forms a cohesive pattern
    that provides an illusion of color vibrations. The juxtaposition of orderly geometry and chaotic elements symbolizes the
    tension between surface impressions and concealed complexities. Yet, the piece is not content with passive observation. It
    beckons the audience to engage actively, physically interacting with the artwork to reveal hidden messages and unlock
    additional layers of the narrative. The convergence of aesthetics, depth, and interactivity blurs the lines between observer
    and creator, challenging traditional notions of static art. At its intellectual core, the word play within the text introduces
    a cognitive puzzle. Viewers are prompted to decipher hidden meanings and confront the intricate layers of the narrative. "Writings
    on the Wall" offers a unique and thought-provoking artistic expression that challenges preconceptions and contributes
    to the dialogue on the transformative potential of art. Through the fusion of visual aesthetics, conceptual depth, and
    interactive engagement, this submission seeks to inspire and immerse the audience in the exploration of layered meanings,
    pushing the boundaries of traditional artistic narratives. José Margulis est un artiste contemporain vénézuélien dont
    le travail explore les frontières entre l'espace bidimensionnel et tridimensionnel. En utilisant la photographie, l'impression
    numérique et des feuilles d'acrylique, Margulis crée des œuvres illusionnistes où le volume, l'espace et la lumière semblent
    se déplacer devant vos yeux. "Je traite mes pièces tridimensionnelles comme des pièges à lumière ou des plans secrets,
    dans lesquels en contrôlant l'emplacement de leurs composants, je suis capable de créer des conteneurs 3D intrigants",
    a-t-il expliqué. "Leurs conceptions sont ensuite entièrement révélées en appliquant ou en versant de la lumière dedans.
    En un sens, la lumière devient l'encre qui révèle la conception en suivant un modèle 3D." Né en 1970 à Caracas, au Venezuela,
    il a étudié la photographie à l'université avant de travailler pour l'entreprise d'impression numérique de sa famille.
    En combinant ces deux compétences avec son intérêt pour la sculpture, Margulis a commencé à créer des œuvres en dialogue
    avec les artistes Jesús Rafael Soto et Naum Gabo. L'artiste vit actuellement et travaille à Miami, en Floride. "Writings
    on the Wall" est une exploration captivante qui fusionne harmonieusement l'art cinétique, optique et géométrique abstrait
    avec l'intellect de la double entendre. Au cœur de cette pièce multimédia, les spectateurs sont invités à confronter l'interaction
    dynamique entre le texte écrit, la perception visuelle et les nuances des couches de sens dissimulées dans sa tapisserie
    géométrique. Le titre de l'œuvre sert à la fois de descripteur littéral et d'appel métaphorique à l'action.
